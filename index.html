<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamX - Pro Video Engine</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background-color: #0f0f0f; color: white; font-family: 'Roboto', sans-serif; margin: 0; }
        .nav-active { color: #24A1DE; border-top: 2px solid #24A1DE; }
        .video-card { background: #1a1a1a; border-radius: 12px; overflow: hidden; margin-bottom: 15px; }
        .stats-box { background: #1a1a1a; padding: 15px; border-radius: 15px; border: 1px solid #333; }
        input { background: #1a1a1a !important; border: 1px solid #333 !important; color: white !important; padding: 12px; border-radius: 8px; width: 100%; }
        
        /* Auto Ad Overlay */
        #adOverlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="adOverlay">
        <div class="text-center p-6">
            <i class="fa-solid fa-rectangle-ad text-5xl text-[#24A1DE] mb-4"></i>
            <h2 class="text-xl font-bold">Auto Ad Loading...</h2>
            <p class="text-sm text-gray-400 mt-2">Please wait a few seconds to continue video.</p>
        </div>
    </div>

    <div id="app">
        <header class="p-4 flex justify-between items-center sticky top-0 bg-[#0f0f0f] z-50 border-b border-zinc-900">
            <div class="flex items-center gap-2">
                <span class="text-blue-500 font-black italic text-xl">STREAMX</span>
            </div>
            <div id="adminToggle" class="hidden">
                <button onclick="changeTab('admin')" class="bg-red-600/20 text-red-500 text-[10px] font-bold px-3 py-1 rounded-full border border-red-500/30">ADMIN PANEL</button>
            </div>
        </header>

        <main id="mainContent" class="pb-24"></main>

        <nav class="fixed bottom-0 w-full bg-[#0f0f0f] border-t border-zinc-900 flex justify-around py-3 z-50">
            <button onclick="changeTab('home')" class="flex flex-col items-center text-gray-400" id="btn-home">
                <i class="fa-solid fa-house text-lg"></i><span class="text-[10px] mt-1">Home</span>
            </button>
            <button onclick="changeTab('shorts')" class="flex flex-col items-center text-gray-400" id="btn-shorts">
                <i class="fa-solid fa-bolt text-lg"></i><span class="text-[10px] mt-1">Shorts</span>
            </button>
            <button onclick="changeTab('upload')" class="flex flex-col items-center text-[#24A1DE]">
                <i class="fa-solid fa-circle-plus text-3xl"></i>
            </button>
            <button onclick="changeTab('library')" class="flex flex-col items-center text-gray-400" id="btn-library">
                <i class="fa-solid fa-layer-group text-lg"></i><span class="text-[10px] mt-1">Library</span>
            </button>
            <button onclick="changeTab('account')" class="flex flex-col items-center text-gray-400" id="btn-account">
                <i class="fa-solid fa-circle-user text-lg"></i><span class="text-[10px] mt-1">Account</span>
            </button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, push, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYaSQbU380U6hcUmBgkDr4WAEmEu45X_U",
            authDomain: "tonnow-pro.firebaseapp.com",
            databaseURL: "https://tonnow-pro-default-rtdb.firebaseio.com",
            projectId: "tonnow-pro",
            storageBucket: "tonnow-pro.firebasestorage.app",
            messagingSenderId: "585362095075",
            appId: "1:585362095075:web:a94096a650ab74f3e03ed6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe?.user || { id: "8382029741", first_name: "Minhaz" };
        const ADMIN_ID = "8382029741";

        let currentTab = 'home';
        let videos = [];
        let adInterval;

        // Auto Ad Settings
        let adConfig = { interval: 60, adsgram: '', monetag: '' };

        onValue(ref(db, 'adConfig'), (s) => { if(s.val()) adConfig = s.val(); });
        onValue(ref(db, 'videos'), (s) => { 
            videos = s.val() ? Object.entries(s.val()).map(([id, v]) => ({id, ...v})).reverse() : [];
            render();
        });

        window.changeTab = (tab) => {
            currentTab = tab;
            render();
            if(tab !== 'home') stopAdTimer();
        };

        // --- Auto Ad Logic ---
        function startAdTimer() {
            stopAdTimer();
            adInterval = setInterval(() => {
                showAutoAd();
            }, adConfig.interval * 1000);
        }

        function stopAdTimer() {
            clearInterval(adInterval);
        }

        function showAutoAd() {
            const overlay = document.getElementById('adOverlay');
            overlay.style.display = 'flex';
            
            // Trigger Ad Network (Adsgram logic here)
            console.log("Triggering Ad Network ID:", adConfig.adsgram);
            
            setTimeout(() => {
                overlay.style.display = 'none';
                tg.showAlert("Ad View Complete! Reward Added.");
                // Update balance in Firebase
                const balanceRef = ref(db, `users/${user.id}/adPoints`);
                update(ref(db, `users/${user.id}`), { adPoints: (users[user.id]?.adPoints || 0) + 1 });
            }, 5000); // 5 sec ad simulation
        }

        function render() {
            const container = document.getElementById('mainContent');
            if(user.id.toString() === ADMIN_ID) document.getElementById('adminToggle').classList.remove('hidden');

            if (currentTab === 'home') {
                startAdTimer(); // স্টার্ট অটো অ্যাড যখন হোম পেজে থাকবে
                container.innerHTML = videos.map(v => `
                    <div class="video-card p-3">
                        <img src="${v.thumb}" class="w-full aspect-video object-cover rounded-lg mb-3">
                        <h3 class="font-bold text-sm">${v.title}</h3>
                        <div class="flex justify-between items-center mt-2 text-gray-500 text-[10px]">
                            <span>${v.views || 0} Views • ${v.uploaderName}</span>
                            <button onclick="window.playVideo('${v.url}')" class="bg-red-600 px-4 py-1.5 rounded-full text-white font-bold">Play Video</button>
                        </div>
                    </div>
                `).join('');
            } 
            
            else if (currentTab === 'library') {
                container.innerHTML = `
                    <div class="p-4 space-y-6">
                        <h2 class="text-lg font-bold">COMMUNITY STATS</h2>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="stats-box text-center"><p class="text-green-500 font-bold text-xl">6</p><p class="text-[10px] text-gray-500">ONLINE</p></div>
                            <div class="stats-box text-center"><p class="font-bold text-xl">${Object.keys(videos).length}</p><p class="text-[10px] text-gray-500">TOTAL POSTS</p></div>
                        </div>
                        <div class="stats-box bg-gradient-to-r from-yellow-600/20 to-transparent">
                            <i class="fa-solid fa-trophy text-yellow-500 mb-2"></i>
                            <h3 class="font-bold">Trending Content</h3>
                            <p class="text-[10px] text-gray-400">সবচেয়ে বেশি লাইক এবং ভিউ পাওয়া ভিডিওগুলো এখানে দেখুন!</p>
                        </div>
                    </div>
                `;
            }

            else if (currentTab === 'account') {
                const myPoints = 4; // Simulated
                container.innerHTML = `
                    <div class="p-6">
                        <div class="bg-blue-600 p-6 rounded-3xl mb-6 shadow-xl shadow-blue-900/20">
                            <p class="text-[10px] font-bold opacity-80 uppercase">Balance</p>
                            <h1 class="text-4xl font-black mt-1">$${(myPoints * 0.01).toFixed(2)}</h1>
                            <div class="flex justify-between items-center mt-6">
                                <span class="text-xs font-bold">ADS: ${myPoints}/1000</span>
                                <button class="bg-white text-blue-600 px-6 py-2 rounded-full font-bold text-xs">WITHDRAW</button>
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-2">
                            <div class="stats-box text-center"><p class="font-bold">1</p><p class="text-[8px] text-gray-500">POSTS</p></div>
                            <div class="stats-box text-center"><p class="font-bold">0</p><p class="text-[8px] text-gray-500">VIEWS</p></div>
                            <div class="stats-box text-center"><p class="font-bold">0</p><p class="text-[8px] text-gray-500">LIKES</p></div>
                        </div>
                    </div>
                `;
            }

            else if (currentTab === 'upload') {
                container.innerHTML = `
                    <div class="p-6 space-y-4">
                        <h2 class="text-blue-500 font-bold uppercase tracking-widest">+ NEW UPLOAD</h2>
                        <input id="vTitle" placeholder="Video Title">
                        <input id="vThumb" placeholder="Thumbnail URL">
                        <input id="vUrl" placeholder="Direct Video Link (MP4)">
                        <button onclick="window.savePost()" class="w-full bg-blue-500 py-4 rounded-xl font-bold uppercase">Publish Post</button>
                    </div>
                `;
            }

            else if (currentTab === 'admin' && user.id.toString() === ADMIN_ID) {
                container.innerHTML = `
                    <div class="p-6 space-y-4">
                        <h2 class="text-red-500 font-bold uppercase">Admin Panel</h2>
                        <input id="adSec" placeholder="Ad Interval (Seconds)" value="${adConfig.interval}">
                        <input id="monId" placeholder="Monetag Zone ID" value="${adConfig.monetag}">
                        <input id="adsId" placeholder="Adsgram Block ID" value="${adConfig.adsgram}">
                        <button onclick="window.saveAdConfig()" class="w-full bg-green-600 py-4 rounded-xl font-bold">SAVE SETTINGS</button>
                    </div>
                `;
            }
        }

        window.playVideo = (url) => { tg.openLink(url); };

        window.savePost = () => {
            const data = {
                title: document.getElementById('vTitle').value,
                thumb: document.getElementById('vThumb').value,
                url: document.getElementById('vUrl').value,
                uploaderName: user.first_name,
                uploaderId: user.id,
                views: 0
            };
            push(ref(db, 'videos'), data);
            changeTab('home');
        };

        window.saveAdConfig = () => {
            set(ref(db, 'adConfig'), {
                interval: document.getElementById('adSec').value,
                monetag: document.getElementById('monId').value,
                adsgram: document.getElementById('adsId').value
            });
            tg.showAlert("Ad Settings Updated!");
        };

        render();
    </script>
</body>
</html>
