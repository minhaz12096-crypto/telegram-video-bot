<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamX App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; }
        #forceTask { position: fixed; inset: 0; background: #000; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; p: 20px; }
        .v-card { background: #0a0a0a; border-radius: 15px; overflow: hidden; border: 1px solid #1a1a1a; margin-bottom: 20px; }
        #adLocker { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="forceTask">
        <div class="w-24 h-24 bg-blue-600/10 rounded-full flex items-center justify-center mb-6"><i class="fa-solid fa-lock text-4xl text-blue-500"></i></div>
        <h2 class="text-xl font-black uppercase">Join Channel First</h2>
        <p class="text-xs text-zinc-500 px-10 mt-4">You must join our official channel to unlock the app features.</p>
        <button onclick="joinNow()" class="mt-10 bg-blue-600 px-10 py-4 rounded-2xl font-black uppercase text-xs">Join Channel</button>
        <button onclick="checkJoin()" class="mt-4 text-zinc-500 font-bold text-[10px] uppercase">I Have Joined</button>
    </div>

    <div id="adLocker">
        <div class="animate-spin h-10 w-10 border-4 border-blue-600 border-t-transparent rounded-full mb-4"></div>
        <p class="text-xs font-bold uppercase tracking-widest">Watching Ad to Unlock Video...</p>
    </div>

    <div id="mainApp">
        <header class="p-5 flex justify-between items-center sticky top-0 bg-black/80 backdrop-blur-md z-50">
            <h1 class="text-2xl font-black italic text-blue-500 tracking-tighter">STREAMX</h1>
            <div class="w-8 h-8 rounded-full bg-zinc-900 flex items-center justify-center border border-zinc-800"><i class="fa-solid fa-user text-xs"></i></div>
        </header>

        <main id="content" class="p-4 pb-32">
            </main>

        <nav class="fixed bottom-0 w-full bg-black border-t border-zinc-900 flex justify-around py-4 z-50">
            <button onclick="tab('home')" class="flex flex-col items-center text-blue-500"><i class="fa-solid fa-home"></i><span class="text-[9px] mt-1">Home</span></button>
            <button onclick="tab('upload')" class="flex flex-col items-center text-zinc-500"><i class="fa-solid fa-cloud-arrow-up"></i><span class="text-[9px] mt-1">Upload</span></button>
            <button onclick="tab('wallet')" class="flex flex-col items-center text-zinc-500"><i class="fa-solid fa-wallet"></i><span class="text-[9px] mt-1">Wallet</span></button>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, push, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYaSQbU380U6hcUmBgkDr4WAEmEu45X_U",
            authDomain: "tonnow-pro.firebaseapp.com",
            databaseURL: "https://tonnow-pro-default-rtdb.firebaseio.com",
            projectId: "tonnow-pro",
            storageBucket: "tonnow-pro.firebasestorage.app"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe?.user || { id: "12345", first_name: "User" };

        let taskConfig = {};
        let adsConfig = {};

        // Force Task Check
        onValue(ref(db, 'config'), (snap) => {
            if(snap.exists()) {
                taskConfig = snap.val().task;
                adsConfig = snap.val().ads;
                checkJoin();
            }
        });

        window.checkJoin = () => {
            // Real API integration would go here. For now, showing based on config existence.
            if(taskConfig?.link) document.getElementById('forceTask').style.display = 'flex';
        };

        window.joinNow = () => {
            tg.openTelegramLink(taskConfig.link);
            document.getElementById('forceTask').style.display = 'none'; // Simulate join
        };

        // Render Home
        onValue(ref(db, 'videos'), (snap) => {
            const root = document.getElementById('content');
            root.innerHTML = "";
            if(snap.val()) {
                Object.entries(snap.val()).reverse().forEach(([id, v]) => {
                    root.innerHTML += `
                        <div class="v-card" onclick="playWithAd('${id}')">
                            <div class="relative">
                                <img src="${v.thumb}" class="w-full aspect-video object-cover">
                                <div class="absolute bottom-2 right-2 bg-black/80 px-2 py-1 rounded text-[10px] font-bold">${v.duration}</div>
                                <div class="absolute inset-0 flex items-center justify-center bg-black/40"><i class="fa-solid fa-lock text-xl"></i></div>
                            </div>
                            <div class="p-4">
                                <h3 class="font-bold text-sm">${v.title}</h3>
                                <p class="text-[10px] text-zinc-500 mt-1 uppercase">${v.uploaderName} • ${v.views || 0} views</p>
                            </div>
                        </div>`;
                });
            }
        });

        window.playWithAd = (id) => {
            document.getElementById('adLocker').style.display = 'flex';
            // Trigger your video ad here (Adsgram or Monetag)
            setTimeout(() => {
                document.getElementById('adLocker').style.display = 'none';
                tg.showAlert("Video Unlocked! Play now.");
                // Here you would open the actual player
            }, 5000); // Wait 5 seconds
        };

        window.tab = (t) => {
            const root = document.getElementById('content');
            if(t === 'upload') {
                root.innerHTML = `
                    <div class="space-y-4">
                        <h2 class="text-xl font-black italic">Publish Content</h2>
                        <input id="upTitle" placeholder="Title" class="w-full bg-zinc-900 p-4 rounded-2xl border border-zinc-800 text-sm">
                        <input id="upThumb" placeholder="Thumbnail Link" class="w-full bg-zinc-900 p-4 rounded-2xl border border-zinc-800 text-sm">
                        <input id="upUrl" placeholder="Video MP4 Link" class="w-full bg-zinc-900 p-4 rounded-2xl border border-zinc-800 text-sm">
                        <input id="upDur" placeholder="Duration (e.g. 05:40)" class="w-full bg-zinc-900 p-4 rounded-2xl border border-zinc-800 text-sm">
                        <button onclick="handleUpload()" class="w-full bg-blue-600 py-4 rounded-2xl font-black uppercase text-xs">Post Now</button>
                    </div>`;
            }
        };

        window.handleUpload = () => {
            const data = {
                title: document.getElementById('upTitle').value,
                thumb: document.getElementById('upThumb').value,
                url: document.getElementById('upUrl').value,
                duration: document.getElementById('upDur').value,
                uploaderName: user.first_name,
                userId: user.id,
                views: 0
            };
            push(ref(db, 'videos'), data);
            tg.showAlert("Post Uploaded!");
            location.reload();
        };

    </script>
</body>
</html>
