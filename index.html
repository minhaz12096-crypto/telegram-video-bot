<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamX Ultimate</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background-color: #0f0f0f; color: white; margin: 0; font-family: 'Roboto', sans-serif; overflow-x: hidden; }
        .nav-item { color: #aaaaaa; font-size: 10px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.2s; }
        .nav-item.active { color: #24A1DE; }
        input, select { background-color: #1a1a1a !important; border: 1px solid #333 !important; color: white !important; outline: none; width: 100%; padding: 14px; border-radius: 12px; }
        .video-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: none; overflow-y: auto; }
        .balance-card { background: linear-gradient(135deg, #24A1DE, #1474a1); border-radius: 24px; padding: 25px; }
        .action-btn { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #ccc; cursor: pointer; }
        .action-btn.active { color: #24A1DE; }
    </style>
</head>
<body>
    <div id="app"></div>

    <div id="videoPopup" class="video-popup">
        <div class="p-4 flex items-center justify-between sticky top-0 bg-black/90 z-[10001]">
            <button onclick="closeVideo()" class="text-2xl"><i class="fa-solid fa-chevron-down"></i></button>
            <span class="text-[10px] font-black uppercase text-[#24A1DE]">Playing Now</span>
            <button onclick="window.shareCurrent()" class="text-xl"><i class="fa-solid fa-share-nodes"></i></button>
        </div>
        <video id="mainPlayer" controls class="w-full aspect-video bg-zinc-900"></video>
        <div id="videoDetails" class="p-5 space-y-6">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYaSQbU380U6hcUmBgkDr4WAEmEu45X_U",
            authDomain: "tonnow-pro.firebaseapp.com",
            databaseURL: "https://tonnow-pro-default-rtdb.firebaseio.com",
            projectId: "tonnow-pro",
            storageBucket: "tonnow-pro.firebasestorage.app",
            messagingSenderId: "585362095075",
            appId: "1:585362095075:web:a94096a650ab74f3e03ed6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe?.user || { id: "8382029741", first_name: "Minhaz" };
        const userTgId = user.id.toString();

        let currentTab = 'home';
        let videos = [];
        let users = {};
        let currentLang = 'en';
        let activeVidId = null;

        const i18n = {
            en: { home: "Home", shorts: "Shorts", lib: "Library", acc: "Account", up: "Upload", bal: "Balance", wit: "Withdraw", search: "Search..." },
            bn: { home: "হোম", shorts: "শর্টস", lib: "লাইব্রেরি", acc: "অ্যাকাউন্ট", up: "আপলোড", bal: "ব্যালেন্স", wit: "উইথড্র", search: "খুঁজুন..." },
            ru: { home: "Главная", shorts: "Шорты", lib: "Библиотека", acc: "Аккаунт", up: "Создать", bal: "Баланс", wit: "Вывод", search: "Поиск..." }
        };

        onValue(ref(db, 'videos'), (s) => { videos = s.val() ? Object.entries(s.val()).map(([id,v]) => ({id,...v})).reverse() : []; render(); });
        onValue(ref(db, 'users'), (s) => { users = s.val() || {}; currentLang = users[userTgId]?.lang || 'en'; render(); });

        window.render = () => {
            const root = document.getElementById('app');
            const t = i18n[currentLang];
            const adPoints = users[userTgId]?.adPoints || 0;
            const balance = (adPoints >= 1000) ? (adPoints / 1000) * 10 : 0;

            let header = `
                <header class="p-4 flex justify-between items-center sticky top-0 bg-[#0f0f0f] z-50 border-b border-zinc-900">
                    <select onchange="window.setLang(this.value)" class="!w-16 !p-1 !text-[10px]">
                        <option value="en" ${currentLang==='en'?'selected':''}>EN</option>
                        <option value="bn" ${currentLang==='bn'?'selected':''}>BN</option>
                        <option value="ru" ${currentLang==='ru'?'selected':''}>RU</option>
                    </select>
                    <span class="font-black text-lg italic">STREAMX</span>
                    <i class="fa-solid fa-magnifying-glass text-zinc-400" onclick="window.search()"></i>
                </header>
            `;

            let content = '';
            if (currentTab === 'home') {
                content = videos.map(v => `
                    <div class="mb-5" onclick="window.unlockAndPlay('${v.id}')">
                        <img src="${v.thumb}" class="w-full aspect-video object-cover">
                        <div class="p-3 flex gap-3">
                            <div class="w-9 h-9 rounded-full bg-zinc-800 flex items-center justify-center font-bold text-[#24A1DE]">${v.uploaderName[0]}</div>
                            <div class="flex-1">
                                <h3 class="text-sm font-bold line-clamp-2">${v.title}</h3>
                                <p class="text-[10px] text-zinc-500 uppercase">${v.uploaderName} • ${v.views || 0} views</p>
                            </div>
                        </div>
                    </div>
                `).join('');
            } else if (currentTab === 'account') {
                content = `
                    <div class="p-5 space-y-6">
                        <div class="balance-card">
                            <p class="text-[10px] font-black uppercase opacity-70">${t.bal}</p>
                            <h2 class="text-4xl font-black mt-2">$${balance.toFixed(2)}</h2>
                            <div class="flex justify-between items-center mt-6 pt-4 border-t border-white/10">
                                <span class="text-[10px]">AD VIEWS: ${adPoints}/1000</span>
                                <button onclick="window.withdraw(${balance})" class="bg-white text-[#24A1DE] px-5 py-1.5 rounded-full font-black text-[10px]">WITHDRAW</button>
                            </div>
                        </div>
                    </div>
                `;
            } else if (currentTab === 'upload') {
                content = `
                    <div class="p-6 space-y-4">
                        <h2 class="text-xs font-black uppercase tracking-widest text-zinc-500">${t.up}</h2>
                        <input id="t" placeholder="Title">
                        <input id="th" placeholder="Thumbnail URL">
                        <input id="u" placeholder="MP4 URL">
                        <input id="dur" placeholder="Duration">
                        <button onclick="window.saveVideo()" class="w-full bg-[#24A1DE] py-4 rounded-2xl font-black uppercase shadow-lg">Publish</button>
                    </div>
                `;
            }

            root.innerHTML = header + `<main class="pb-28">${content}</main>` + `
                <nav class="fixed bottom-0 w-full bg-[#0f0f0f] border-t border-zinc-900 flex justify-around py-4 z-50">
                    <button onclick="go('home')" class="nav-item ${currentTab==='home'?'active':''}"><i class="fa-solid fa-house text-xl"></i><span>${t.home}</span></button>
                    <button onclick="go('shorts')" class="nav-item"><i class="fa-solid fa-bolt text-xl"></i><span>${t.shorts}</span></button>
                    <button onclick="go('upload')" class="nav-item ${currentTab==='upload'?'active':''}"><i class="fa-solid fa-circle-plus text-3xl text-[#24A1DE]"></i></button>
                    <button onclick="go('lib')" class="nav-item"><i class="fa-solid fa-layer-group text-xl"></i><span>${t.lib}</span></button>
                    <button onclick="go('account')" class="nav-item ${currentTab==='account'?'active':''}"><i class="fa-solid fa-circle-user text-xl"></i><span>${t.acc}</span></button>
                </nav>
            `;
        };

        window.unlockAndPlay = (id) => {
            // Simulation of Ad Unlock Logic
            tg.showConfirm("Unlock this video by watching an ad?", (ok) => {
                if(ok) window.playVideo(id);
            });
        };

        window.playVideo = (id) => {
            const v = videos.find(x => x.id === id);
            if(!v) return;
            activeVidId = id;
            const player = document.getElementById('mainPlayer');
            player.src = v.url;
            document.getElementById('videoPopup').style.display = 'block';
            player.play();

            // Reward Owner
            const ownerId = v.uploaderId;
            if(ownerId !== userTgId) {
                const currentPts = users[ownerId]?.adPoints || 0;
                update(ref(db, `users/${ownerId}`), { adPoints: currentPts + 1 });
            }
            update(ref(db, `videos/${id}`), { views: (v.views || 0) + 1 });

            document.getElementById('videoDetails').innerHTML = `
                <h1 class="text-lg font-black">${v.title}</h1>
                <div class="flex justify-around bg-zinc-900 py-5 rounded-2xl border border-zinc-800">
                    <div class="action-btn" onclick="window.likeVideo('${id}')"><i class="fa-solid fa-thumbs-up text-xl mb-1"></i><span id="lk-count">${v.likes || 0}</span></div>
                    <div class="action-btn" onclick="window.showComments()"><i class="fa-solid fa-comment text-xl mb-1"></i><span>Comment</span></div>
                    <div class="action-btn" onclick="window.shareCurrent()"><i class="fa-solid fa-share text-xl mb-1"></i><span>Share</span></div>
                    <div class="action-btn"><i class="fa-solid fa-download text-xl mb-1"></i><span>Save</span></div>
                </div>
                <div class="p-4 bg-zinc-900 rounded-xl mt-4">
                    <p class="text-[10px] uppercase font-bold text-zinc-500">Comments</p>
                    <div class="mt-2 flex gap-3"><input id="cmInput" placeholder="Add a comment..." class="!py-2 !text-xs"><button onclick="window.postComment('${id}')" class="text-[#24A1DE] font-bold">Post</button></div>
                    <div id="commentsList" class="mt-4 space-y-3"></div>
                </div>
            `;
        };

        window.likeVideo = (id) => {
            const currentLikes = (videos.find(v => v.id === id).likes || 0) + 1;
            update(ref(db, `videos/${id}`), { likes: currentLikes });
            tg.showAlert("Liked!");
        };

        window.postComment = (id) => {
            const cm = document.getElementById('cmInput').value;
            if(!cm) return;
            push(ref(db, `videos/${id}/comments`), { user: user.first_name, text: cm, date: Date.now() });
            document.getElementById('cmInput').value = "";
            tg.showAlert("Comment added!");
        };

        window.go = (t) => { currentTab = t; render(); };
        window.setLang = (l) => { update(ref(db, `users/${userTgId}`), { lang: l }); };
        window.closeVideo = () => { document.getElementById('videoPopup').style.display = 'none'; document.getElementById('mainPlayer').pause(); };
        window.shareCurrent = () => { tg.shareLink("https://t.me/YourBot", "Watch this video on StreamX!"); };
        window.withdraw = (bal) => { if(bal < 10) tg.showAlert("Need $10 (1000 Ads)"); else tg.showAlert("Withdraw Sent!"); };
        window.search = () => { tg.showAlert("Search logic active."); };

        window.saveVideo = () => {
            const d = { title: document.getElementById('t').value, thumb: document.getElementById('th').value, url: document.getElementById('u').value, duration: document.getElementById('dur').value, uploaderId: userTgId, uploaderName: user.first_name, views: 0, date: Date.now() };
            if(d.title && d.url) { push(ref(db, 'videos'), d); window.go('home'); }
        };

        render();
    </script>
</body>
</html>
