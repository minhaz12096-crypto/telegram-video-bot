<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamX Ultimate Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background-color: #0f0f0f; color: white; margin: 0; font-family: 'Roboto', sans-serif; overflow-x: hidden; }
        .nav-item { color: #aaaaaa; font-size: 10px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.2s; }
        .nav-item.active { color: #24A1DE; }
        input, select { background-color: #1a1a1a !important; border: 1px solid #333 !important; color: white !important; outline: none; width: 100%; padding: 14px; border-radius: 12px; }
        .balance-card { background: linear-gradient(135deg, #24A1DE, #1474a1); border-radius: 24px; padding: 25px; box-shadow: 0 10px 30px rgba(36, 161, 222, 0.3); }
        .video-popup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 10000; display: none; overflow-y: auto; }
        .stats-box { background: #161616; border: 1px solid #222; border-radius: 16px; padding: 12px; text-align: center; }
        .action-btn { display: flex; flex-direction: column; align-items: center; font-size: 10px; color: #ccc; cursor: pointer; }
        .admin-tag { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); padding: 2px 8px; rounded-md; font-size: 9px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="app"></div>

    <div id="videoPopup" class="video-popup">
        <div class="p-4 flex items-center justify-between sticky top-0 bg-black/80 backdrop-blur-md z-50">
            <button onclick="closeVideo()" class="text-2xl"><i class="fa-solid fa-chevron-down"></i></button>
            <span class="text-[10px] font-black uppercase tracking-widest text-[#24A1DE]">Streaming Now</span>
            <button onclick="window.shareCurrent()" class="text-xl"><i class="fa-solid fa-share-nodes"></i></button>
        </div>
        <video id="mainPlayer" controls autoplay class="w-full aspect-video bg-zinc-900 shadow-2xl"></video>
        <div id="videoDetails" class="p-5 space-y-6">
            </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYaSQbU380U6hcUmBgkDr4WAEmEu45X_U",
            authDomain: "tonnow-pro.firebaseapp.com",
            databaseURL: "https://tonnow-pro-default-rtdb.firebaseio.com",
            projectId: "tonnow-pro",
            storageBucket: "tonnow-pro.firebasestorage.app",
            messagingSenderId: "585362095075",
            appId: "1:585362095075:web:a94096a650ab74f3e03ed6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tg = window.Telegram.WebApp;
        
        const user = tg.initDataUnsafe?.user || { id: "8382029741", first_name: "User" };
        const userTgId = user.id.toString();
        const ADMIN_ID = "8382029741"; 

        let currentTab = 'home';
        let videos = [];
        let users = {};
        let currentLang = 'en';
        let activeVideo = null;

        // --- Multi-Language Matrix ---
        const i18n = {
            en: { home: "Home", shorts: "Shorts", lib: "Library", acc: "Account", up: "Upload", bal: "Balance", wit: "Withdraw", ads: "Ads Viewed", verify: "Verify Bot", search: "Search videos..." },
            bn: { home: "হোম", shorts: "শর্টস", lib: "লাইব্রেরি", acc: "অ্যাকাউন্ট", up: "আপলোড", bal: "ব্যালেন্স", wit: "উইথড্র", ads: "অ্যাড ভিউ", verify: "বট ভেরিফাই", search: "ভিডিও খুঁজুন..." },
            ru: { home: "Главная", shorts: "Шорты", lib: "Библиотека", acc: "Аккаунт", up: "Загрузить", bal: "Баланс", wit: "Вывод", ads: "Просмотры", verify: "Бот", search: "Поиск..." }
        };

        // --- Data Listeners ---
        onValue(ref(db, 'videos'), (s) => { videos = s.val() ? Object.entries(s.val()).map(([id,v]) => ({id,...v})).reverse() : []; render(); });
        onValue(ref(db, 'users'), (s) => { 
            users = s.val() || {}; 
            currentLang = users[userTgId]?.lang || 'en';
            render(); 
        });

        window.render = () => {
            const root = document.getElementById('app');
            const isAdmin = (userTgId === ADMIN_ID);
            const isVerified = users[userTgId]?.verified || false;
            const t = i18n[currentLang];
            
            const myVideos = videos.filter(v => v.uploaderId === userTgId);
            const adPoints = users[userTgId]?.adPoints || 0;
            const balance = (adPoints >= 1000) ? (adPoints / 1000) * 10 : 0; // ১০ ডলার লজিক

            let header = `
                <header class="p-4 flex justify-between items-center sticky top-0 bg-[#0f0f0f] z-50 border-b border-zinc-900">
                    <div class="flex items-center gap-2">
                        <select onchange="window.setLang(this.value)" class="!w-16 !p-1 !text-[10px] !bg-zinc-900 !border-none">
                            <option value="en" ${currentLang==='en'?'selected':''}>EN</option>
                            <option value="bn" ${currentLang==='bn'?'selected':''}>BN</option>
                            <option value="ru" ${currentLang==='ru'?'selected':''}>RU</option>
                        </select>
                        <span class="font-black italic tracking-tighter text-lg">STREAMX</span>
                    </div>
                    <div class="flex items-center gap-4">
                        <i class="fa-solid fa-magnifying-glass text-zinc-400" onclick="tg.showAlert('${t.search}')"></i>
                        ${isAdmin ? `<span class="admin-tag">ADMIN</span>` : `<div class="w-8 h-8 rounded-full bg-zinc-800 flex items-center justify-center text-[10px] font-bold text-[#24A1DE] border border-zinc-700">${user.first_name[0]}</div>`}
                    </div>
                </header>
            `;

            let content = '';

            if (currentTab === 'home') {
                content = videos.map(v => `
                    <div class="mb-6" onclick="window.playVideo('${v.id}')">
                        <div class="relative">
                            <img src="${v.thumb}" class="w-full aspect-video object-cover">
                            <span class="absolute bottom-2 right-2 bg-black/80 text-[10px] px-2 py-0.5 rounded font-bold">${v.duration || '4:20'}</span>
                        </div>
                        <div class="p-4 flex gap-3">
                            <div class="w-10 h-10 rounded-full bg-zinc-900 border border-zinc-800 flex items-center justify-center font-bold text-[#24A1DE]">${v.uploaderName[0]}</div>
                            <div class="flex-1">
                                <h3 class="text-sm font-bold line-clamp-2 leading-tight">${v.title}</h3>
                                <p class="text-[10px] text-zinc-500 mt-1 uppercase font-medium">${v.uploaderName} • ${v.views || 0} views</p>
                            </div>
                            <i class="fa-solid fa-ellipsis-vertical text-zinc-600 mt-1"></i>
                        </div>
                    </div>
                `).join('');
            }

            else if (currentTab === 'account') {
                content = `
                    <div class="p-6 space-y-6 animate-in fade-in duration-500">
                        <div class="balance-card">
                            <p class="text-[10px] uppercase font-black tracking-[0.2em] opacity-80">${t.bal}</p>
                            <h2 class="text-4xl font-black mt-2 tracking-tighter">$${balance.toFixed(2)}</h2>
                            <div class="flex justify-between items-center mt-8 pt-6 border-t border-white/10">
                                <span class="text-[10px] font-bold opacity-60 uppercase">${t.ads}: ${adPoints} / 1000</span>
                                <button onclick="window.withdraw(${balance})" class="bg-white text-[#24A1DE] px-6 py-2 rounded-full font-black uppercase text-[10px] tracking-widest shadow-lg">Withdraw</button>
                            </div>
                        </div>
                        <div class="grid grid-cols-3 gap-3">
                            <div class="stats-box"><p class="text-lg font-black">${myVideos.length}</p><p class="text-[8px] text-zinc-500 uppercase font-bold">Uploads</p></div>
                            <div class="stats-box"><p class="text-lg font-black text-green-500">0</p><p class="text-[8px] text-zinc-500 uppercase font-bold">Income</p></div>
                            <div class="stats-box"><p class="text-lg font-black text-pink-500">0</p><p class="text-[8px] text-zinc-500 uppercase font-bold">Likes</p></div>
                        </div>
                    </div>
                `;
            }

            else if (currentTab === 'upload') {
                if (!isVerified && !isAdmin) {
                    content = `<div class="p-10 text-center flex flex-col items-center justify-center min-h-[60vh]">
                        <i class="fa-solid fa-shield-halved text-6xl text-[#24A1DE] mb-6 opacity-20"></i>
                        <h2 class="font-black uppercase text-lg">${t.verify}</h2>
                        <p class="text-[11px] text-zinc-500 mt-2 mb-8 px-10 leading-relaxed">Confirm your account via our official bot to start uploading and earning.</p>
                        <button onclick="tg.openTelegramLink('https://t.me/YourBot')" class="w-full bg-[#24A1DE] py-4 rounded-2xl font-black uppercase tracking-widest text-xs">Verify Now</button>
                    </div>`;
                } else {
                    content = `
                        <div class="p-6 space-y-4">
                            <h2 class="text-[10px] font-black uppercase text-zinc-500 tracking-widest mb-4">+ ${t.up} CONTENT</h2>
                            <input id="t" placeholder="Video Title">
                            <input id="th" placeholder="Thumbnail Image URL">
                            <input id="u" placeholder="Direct MP4 Video Link">
                            <input id="dur" placeholder="Duration (e.g. 10:45)">
                            <button onclick="window.saveVideo()" class="w-full bg-[#24A1DE] py-4 rounded-2xl font-black uppercase tracking-widest mt-6 shadow-xl shadow-[#24A1DE]/20">Publish Video</button>
                        </div>
                    `;
                }
            }

            else if (currentTab === 'shorts') {
                content = `<div class="grid grid-cols-3 gap-0.5">${videos.map(v => `<div class="aspect-[9/16] bg-zinc-900 border border-white/5"><img src="${v.thumb}" class="w-full h-full object-cover opacity-60"></div>`).join('')}</div>`;
            }
            
            else if (currentTab === 'lib') {
                content = `<div class="p-10 text-center opacity-30 italic text-xs uppercase tracking-widest">Library History Coming Soon</div>`;
            }

            root.innerHTML = header + `<main class="pb-28">${content}</main>` + `
                <nav class="fixed bottom-0 w-full bg-[#0f0f0f]/95 backdrop-blur-xl border-t border-zinc-900 flex justify-around py-4 z-[999]">
                    <button onclick="go('home')" class="nav-item ${currentTab==='home'?'active':''}"><i class="fa-solid fa-house text-xl"></i><span class="mt-1 font-bold">${t.home}</span></button>
                    <button onclick="go('shorts')" class="nav-item ${currentTab==='shorts'?'active':''}"><i class="fa-solid fa-bolt text-xl"></i><span class="mt-1 font-bold">${t.shorts}</span></button>
                    <button onclick="go('upload')" class="nav-item ${currentTab==='upload'?'active':''}"><i class="fa-solid fa-circle-plus text-3xl text-[#24A1DE]"></i></button>
                    <button onclick="go('lib')" class="nav-item ${currentTab==='lib'?'active':''}"><i class="fa-solid fa-layer-group text-xl"></i><span class="mt-1 font-bold">${t.lib}</span></button>
                    <button onclick="go('account')" class="nav-item ${currentTab==='account'?'active':''}"><i class="fa-solid fa-circle-user text-xl"></i><span class="mt-1 font-bold">${t.acc}</span></button>
                </nav>
            `;
        };

        // --- Core Logic ---
        window.go = (t) => { currentTab = t; render(); };
        window.setLang = (l) => { update(ref(db, `users/${userTgId}`), { lang: l }); };

        window.playVideo = (id) => {
            const v = videos.find(x => x.id === id);
            if(!v) return;
            activeVideo = v;
            
            const player = document.getElementById('mainPlayer');
            player.src = v.url;
            document.getElementById('videoPopup').style.display = 'block';
            
            // View Increment & Point Reward
            const ownerId = v.uploaderId;
            update(ref(db, `videos/${id}`), { views: (v.views || 0) + 1 });
            
            // পয়েন্ট লজিক: ভিডিওর মালিকের পয়েন্ট বাড়বে যদি অন্য কেউ দেখে
            if(ownerId !== userTgId) {
                const ownerPoints = (users[ownerId]?.adPoints || 0) + 1;
                update(ref(db, `users/${ownerId}`), { adPoints: ownerPoints });
            }

            document.getElementById('videoDetails').innerHTML = `
                <div class="space-y-1">
                    <h1 class="text-lg font-black leading-tight">${v.title}</h1>
                    <p class="text-[10px] text-zinc-500 uppercase font-bold">${v.views || 0} views • ${new Date(v.date).toLocaleDateString()}</p>
                </div>
                <div class="flex justify-between items-center py-2">
                    <div class="flex gap-4 items-center">
                        <div class="w-9 h-9 rounded-full bg-[#24A1DE] flex items-center justify-center font-black">${v.uploaderName[0]}</div>
                        <div><p class="text-xs font-bold">${v.uploaderName}</p><p class="text-[9px] text-zinc-500">1.2M Subscribers</p></div>
                    </div>
                    <button class="bg-white text-black px-4 py-1.5 rounded-full text-[10px] font-black uppercase">Subscribe</button>
                </div>
                <div class="flex justify-around items-center bg-zinc-900/50 py-4 rounded-2xl border border-zinc-800">
                    <div class="action-btn text-pink-500"><i class="fa-solid fa-heart text-xl mb-1"></i><span>1.5K</span></div>
                    <div class="action-btn"><i class="fa-solid fa-comment text-xl mb-1"></i><span>420</span></div>
                    <div class="action-btn" onclick="window.shareCurrent()"><i class="fa-solid fa-share text-xl mb-1"></i><span>Share</span></div>
                    <div class="action-btn"><i class="fa-solid fa-download text-xl mb-1"></i><span>Offline</span></div>
                </div>
                <div class="mt-4 p-4 bg-zinc-900 rounded-xl">
                    <p class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Comments • 12</p>
                    <div class="flex gap-3 mt-3 items-center">
                        <div class="w-6 h-6 rounded-full bg-zinc-800"></div>
                        <p class="text-[11px] text-zinc-300">This video is amazing! 🔥</p>
                    </div>
                </div>
            `;
        };

        window.closeVideo = () => {
            const player = document.getElementById('mainPlayer');
            player.pause();
            player.src = "";
            document.getElementById('videoPopup').style.display = 'none';
        };

        window.shareCurrent = () => {
            if(activeVideo) tg.shareLink(activeVideo.url, `Watch ${activeVideo.title} on StreamX!`);
        };

        window.withdraw = (bal) => {
            if(bal < 10) return tg.showAlert("Minimum withdrawal is $10 (1,000 Ad Views required)");
            const reqId = Date.now();
            set(ref(db, `withdraws/${reqId}`), { uid: userTgId, name: user.first_name, amount: bal, status: 'pending' })
            .then(() => tg.showAlert("Request sent to Admin! Admin will approve from bot."));
        };

        window.saveVideo = () => {
            const data = {
                title: document.getElementById('t').value,
                thumb: document.getElementById('th').value,
                url: document.getElementById('u').value,
                duration: document.getElementById('dur').value,
                uploaderId: userTgId,
                uploaderName: user.first_name,
                views: 0, date: Date.now()
            };
            if(data.title && data.url) { push(ref(db, 'videos'), data); window.go('home'); }
            else tg.showAlert("Fill all fields!");
        };

        render();
    </script>
</body>
</html>
