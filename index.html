<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamX - Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background-color: #0f0f0f; color: white; margin: 0; font-family: 'Roboto', sans-serif; overflow-x: hidden; }
        .nav-item { color: #aaaaaa; font-size: 10px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-item.active { color: #24A1DE; }
        input, select { background-color: #1a1a1a !important; border: 1px solid #333 !important; color: white !important; outline: none; width: 100%; padding: 12px; border-radius: 12px; font-size: 14px; }
        .stats-card { background: #181818; border: 1px solid #222; border-radius: 12px; padding: 15px; }
        .admin-box { border: 1px dashed #ef4444; background: rgba(239, 68, 68, 0.05); border-radius: 16px; padding: 15px; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYaSQbU380U6hcUmBgkDr4WAEmEu45X_U",
            authDomain: "tonnow-pro.firebaseapp.com",
            databaseURL: "https://tonnow-pro-default-rtdb.firebaseio.com",
            projectId: "tonnow-pro",
            storageBucket: "tonnow-pro.firebasestorage.app",
            messagingSenderId: "585362095075",
            appId: "1:585362095075:web:a94096a650ab74f3e03ed6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe?.user || { id: "8382029741", first_name: "Minhaz" };
        const userTgId = user.id.toString();
        
        const ADMIN_ID = "8382029741"; 
        const BOT_USERNAME = "Filetourllink1bot"; 

        let currentTab = 'home';
        let videos = [];
        let users = {};
        let adConfig = { monetag: '', adsgram: '' };

        onValue(ref(db, 'videos'), (s) => { videos = s.val() ? Object.entries(s.val()).map(([id,v]) => ({id,...v})).reverse() : []; render(); });
        onValue(ref(db, 'users'), (s) => { users = s.val() || {}; render(); });
        onValue(ref(db, 'adConfig'), (s) => { if(s.val()) adConfig = s.val(); render(); });

        function render() {
            const root = document.getElementById('app');
            const isAdmin = (userTgId === ADMIN_ID);
            const isVerified = users[userTgId]?.verified || false;

            let header = `
                <header class="p-4 flex justify-between items-center sticky top-0 bg-[#0f0f0f] z-50 border-b border-zinc-900">
                    <div class="flex items-center gap-2">
                        <i class="fa-brands fa-telegram text-[#24A1DE] text-2xl"></i>
                        <span class="font-bold tracking-tighter uppercase text-lg">Telegram</span>
                    </div>
                    <div class="flex gap-4 items-center">
                        ${isAdmin ? `<button onclick="window.go('admin')" class="text-[10px] bg-red-500/10 text-red-500 border border-red-500/20 px-3 py-1 rounded-full font-bold">ADMIN</button>` : ''}
                        <i class="fa-solid fa-magnifying-glass text-zinc-400"></i>
                    </div>
                </header>
            `;

            let content = '';

            if (currentTab === 'home') {
                content = videos.length ? videos.map(v => `
                    <div class="mb-5">
                        <div class="relative">
                            <img src="${v.thumb}" class="w-full aspect-video object-cover">
                            <span class="absolute bottom-2 right-2 bg-black/80 text-[10px] px-2 py-0.5 rounded">${v.duration || '00:00'}</span>
                        </div>
                        <div class="p-3 flex gap-3">
                            <div class="w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center font-bold">${v.uploaderName[0]}</div>
                            <div class="flex-1">
                                <h3 class="text-sm font-medium line-clamp-2">${v.title}</h3>
                                <p class="text-[11px] text-zinc-500 mt-1">${v.uploaderName} • ${v.views || 0} views</p>
                            </div>
                        </div>
                    </div>
                `).join('') : '<div class="p-20 text-center text-zinc-600 text-xs uppercase">No videos found</div>';
            }

            else if (currentTab === 'shorts') {
                content = `<div class="grid grid-cols-3 gap-1 p-1">
                    ${videos.map(v => `<div class="aspect-[9/16] bg-zinc-900"><img src="${v.thumb}" class="w-full h-full object-cover"></div>`).join('')}
                </div>`;
            }

            else if (currentTab === 'upload') {
                if (!isVerified && !isAdmin) {
                    content = `
                        <div class="p-10 text-center flex flex-col items-center justify-center min-h-[70vh]">
                            <i class="fa-solid fa-robot text-5xl text-[#24A1DE] mb-5"></i>
                            <h2 class="font-bold text-lg uppercase tracking-tight">Verification Required</h2>
                            <p class="text-xs text-zinc-500 mt-2 mb-8">You must verify your account to upload content.</p>
                            <button onclick="window.openBot()" class="w-full bg-[#24A1DE] py-4 rounded-2xl font-bold uppercase tracking-widest text-sm">Verify via Bot</button>
                        </div>
                    `;
                } else {
                    content = `
                        <div class="p-5 space-y-4">
                            <h2 class="text-sm font-bold uppercase text-zinc-500 tracking-widest mb-2">Create New Post</h2>
                            <input id="t" placeholder="Post Title">
                            <input id="th" placeholder="Thumbnail URL">
                            <input id="u" placeholder="Video Link (Direct MP4)">
                            <div class="flex gap-3">
                                <input id="dur" placeholder="Duration (Ex: 05:00)">
                                <input id="unl" type="number" placeholder="Ads to Unlock">
                            </div>
                            <button onclick="window.saveVideo()" class="w-full bg-[#24A1DE] py-4 rounded-2xl font-bold uppercase mt-4">Publish Post</button>
                        </div>
                    `;
                }
            }

            else if (currentTab === 'library') {
                content = `
                    <div class="p-5 space-y-6">
                        <h2 class="text-xs font-bold uppercase tracking-[0.2em] text-zinc-500">Community Stats</h2>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="stats-card"><p class="text-[10px] text-zinc-500 uppercase">Online</p><p class="text-xl font-bold text-green-500">6</p></div>
                            <div class="stats-card"><p class="text-[10px] text-zinc-500 uppercase">Total Users</p><p class="text-xl font-bold">${Object.keys(users).length}</p></div>
                            <div class="stats-card"><p class="text-[10px] text-zinc-500 uppercase">Total Posts</p><p class="text-xl font-bold">${videos.length}</p></div>
                            <div class="stats-card"><p class="text-[10px] text-zinc-500 uppercase">Most Liked</p><p class="text-xl font-bold text-[#24A1DE]">N/A</p></div>
                        </div>
                        <div class="mt-4 bg-zinc-900/50 p-8 rounded-3xl border border-zinc-800 text-center">
                            <i class="fa-solid fa-trophy text-yellow-500 text-4xl mb-4"></i>
                            <h3 class="font-bold uppercase tracking-tighter">Trending Content</h3>
                            <p class="text-[11px] text-zinc-500 mt-3 leading-relaxed px-4">Top viewed and most engaged posts will be featured here automatically.</p>
                        </div>
                    </div>
                `;
            }

            else if (currentTab === 'account') {
                content = `
                    <div class="p-5">
                        <div class="bg-zinc-900/50 p-6 rounded-3xl border border-zinc-800 flex items-center gap-4 mb-8">
                            <div class="w-16 h-16 bg-[#24A1DE] rounded-full flex items-center justify-center text-2xl font-black shadow-lg shadow-[#24A1DE]/20">${user.first_name[0]}</div>
                            <div>
                                <h2 class="font-bold text-lg">${user.first_name} ${isAdmin ? '👑' : ''}</h2>
                                <p class="text-[10px] text-zinc-500 uppercase tracking-widest mt-1">UID: ${userTgId}</p>
                            </div>
                        </div>
                        <div class="space-y-5">
                            <div>
                                <label class="text-[10px] font-bold text-zinc-500 uppercase tracking-widest ml-1">Language</label>
                                <select class="mt-2" onchange="window.setLang(this.value)">
                                    <option value="en" ${users[userTgId]?.lang === 'en' ? 'selected' : ''}>English (EN)</option>
                                    <option value="bn" ${users[userTgId]?.lang === 'bn' ? 'selected' : ''}>Bengali (BN)</option>
                                </select>
                            </div>
                        </div>
                    </div>
                `;
            }

            else if (currentTab === 'admin' && isAdmin) {
                content = `
                    <div class="p-5 space-y-6">
                        <h2 class="text-red-500 font-bold uppercase tracking-tighter italic">Engine Status: Online</h2>
                        <div class="admin-box space-y-4">
                            <p class="text-[10px] font-bold text-zinc-400 uppercase tracking-widest">Ad Configuration</p>
                            <input id="mId" placeholder="Monetag Zone ID" value="${adConfig.monetag}">
                            <input id="aId" placeholder="Adsgram Block ID" value="${adConfig.adsgram}">
                            <button onclick="window.saveAds()" class="w-full bg-red-600 py-4 rounded-xl font-bold uppercase text-xs mt-2">Save Ad Settings</button>
                        </div>
                    </div>
                `;
            }

            root.innerHTML = header + `<main class="pb-24">${content}</main>` + `
                <nav class="fixed bottom-0 w-full bg-[#0f0f0f] border-t border-zinc-900 flex justify-around py-3 z-50">
                    <button onclick="window.go('home')" class="nav-item ${currentTab === 'home'?'active':''}"><i class="fa-solid fa-house text-xl"></i><span class="mt-1">Home</span></button>
                    <button onclick="window.go('shorts')" class="nav-item ${currentTab === 'shorts'?'active':''}"><i class="fa-solid fa-bolt text-xl"></i><span class="mt-1">Shorts</span></button>
                    <button onclick="window.go('upload')" class="nav-item ${currentTab === 'upload'?'active':''}"><i class="fa-solid fa-circle-plus text-3xl"></i></button>
                    <button onclick="window.go('library')" class="nav-item ${currentTab === 'library'?'active':''}"><i class="fa-solid fa-layer-group text-xl"></i><span class="mt-1">Library</span></button>
                    <button onclick="window.go('account')" class="nav-item ${currentTab === 'account'?'active':''}"><i class="fa-solid fa-circle-user text-xl"></i><span class="mt-1">Account</span></button>
                </nav>
            `;
        }

        window.go = (t) => { currentTab = t; render(); };
        window.openBot = () => { tg.openTelegramLink(`https://t.me/${BOT_USERNAME}`); };
        
        window.setLang = (l) => { update(ref(db, `users/${userTgId}`), { lang: l }); };

        window.saveAds = () => {
            const monetag = document.getElementById('mId').value;
            const adsgram = document.getElementById('aId').value;
            set(ref(db, 'adConfig'), { monetag, adsgram }).then(() => tg.showAlert("Settings Saved"));
        };

        window.saveVideo = () => {
            const data = {
                title: document.getElementById('t').value,
                thumb: document.getElementById('th').value,
                url: document.getElementById('u').value,
                duration: document.getElementById('dur').value,
                adsToUnlock: document.getElementById('unl').value || 0,
                uploaderId: userTgId,
                uploaderName: user.first_name,
                views: 0, date: Date.now()
            };
            if(data.title && data.thumb && data.url) {
                push(ref(db, 'videos'), data);
                window.go('home');
            } else {
                tg.showAlert("Fill all fields");
            }
        };

        render();
    </script>
</body>
</html>
