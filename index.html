<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamX - Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background-color: #0f0f0f; color: white; margin: 0; font-family: 'Roboto', sans-serif; overflow-x: hidden; }
        .nav-item { color: #aaaaaa; font-size: 10px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-item.active { color: #24A1DE; }
        input, select { background-color: #1a1a1a !important; border: 1px solid #333 !important; color: white !important; outline: none; }
        .stats-card { background: #181818; border: 1px solid #222; border-radius: 12px; padding: 12px; }
        .video-duration { position: absolute; bottom: 8px; right: 8px; background: rgba(0,0,0,0.8); padding: 2px 6px; border-radius: 4px; font-size: 10px; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYaSQbU380U6hcUmBgkDr4WAEmEu45X_U",
            authDomain: "tonnow-pro.firebaseapp.com",
            databaseURL: "https://tonnow-pro-default-rtdb.firebaseio.com",
            projectId: "tonnow-pro",
            storageBucket: "tonnow-pro.firebasestorage.app",
            messagingSenderId: "585362095075",
            appId: "1:585362095075:web:a94096a650ab74f3e03ed6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe?.user || { id: "8382029741", first_name: "Guest" };
        const userTgId = user.id.toString();
        const BOT_USERNAME = "Filetourllink1bot"; 

        let currentTab = 'home';
        let videos = [];
        let users = {};
        let isVerified = false;

        onValue(ref(db, 'videos'), (s) => {
            const d = s.val();
            videos = d ? Object.entries(d).map(([id,v]) => ({id,...v})).reverse() : [];
            render();
        });

        onValue(ref(db, 'users'), (s) => {
            users = s.val() || {};
            if(users[userTgId]?.verified) isVerified = true;
            render();
        });

        function render() {
            const root = document.getElementById('app');
            let content = '';

            const header = `
                <header class="p-3 px-4 flex justify-between items-center sticky top-0 bg-[#0f0f0f] z-50 border-b border-zinc-900">
                    <div class="flex items-center gap-2">
                        <i class="fa-brands fa-telegram text-[#24A1DE] text-3xl"></i>
                        <span class="text-white font-bold text-lg italic tracking-tighter">TELEGRAM</span>
                    </div>
                    <i class="fa-solid fa-magnifying-glass text-zinc-400"></i>
                </header>
            `;

            if (currentTab === 'home') {
                content = videos.map(v => `
                    <div class="mb-4">
                        <div class="relative">
                            <img src="${v.thumb}" class="w-full aspect-video object-cover">
                            <span class="video-duration">${v.duration || '00:00'}</span>
                        </div>
                        <div class="p-3 flex gap-3">
                            <div class="w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center font-bold text-xs">${v.uploaderName[0]}</div>
                            <div>
                                <h3 class="text-sm font-medium line-clamp-1">${v.title}</h3>
                                <p class="text-[10px] text-zinc-500">${v.views} views • ${v.uploaderName}</p>
                            </div>
                        </div>
                    </div>
                `).join('');
            } 

            else if (currentTab === 'shorts') {
                content = `<div class="grid grid-cols-3 gap-1 p-1">
                    ${videos.map(v => `<img src="${v.thumb}" class="aspect-[9/16] object-cover">`).join('')}
                </div>`;
            }

            else if (currentTab === 'upload') {
                if(!isVerified) {
                    content = `
                        <div class="p-10 text-center">
                            <i class="fa-solid fa-robot text-6xl text-[#24A1DE] mb-4"></i>
                            <h2 class="text-xl font-bold mb-2 uppercase">Verification Required</h2>
                            <p class="text-xs text-zinc-500 mb-6 italic">Please verify your account via our official bot to start posting content.</p>
                            <button onclick="window.openBot()" class="bg-[#24A1DE] w-full py-4 rounded-xl font-bold uppercase tracking-wide">Connect Bot</button>
                        </div>
                    `;
                } else {
                    content = `
                        <div class="p-5 space-y-4">
                            <h2 class="text-[#24A1DE] font-bold italic tracking-tight"><i class="fa-solid fa-plus"></i> NEW UPLOAD</h2>
                            <input id="t" class="w-full p-4 rounded-xl text-sm" placeholder="Video Title">
                            <input id="th" class="w-full p-4 rounded-xl text-sm" placeholder="Thumbnail URL">
                            <input id="u" class="w-full p-4 rounded-xl text-sm" placeholder="Direct Video Link (MP4)">
                            <div class="flex gap-2">
                                <input id="dur" class="w-1/2 p-4 rounded-xl text-sm" placeholder="Duration (Ex: 05:00)">
                                <input id="unl" type="number" class="w-1/2 p-4 rounded-xl text-sm" placeholder="Ads to Unlock">
                            </div>
                            <button onclick="window.saveVideo()" class="w-full bg-[#24A1DE] py-4 rounded-xl font-bold uppercase mt-2">Publish Post</button>
                        </div>
                    `;
                }
            }

            else if (currentTab === 'library') {
                const totalUsers = Object.keys(users).length;
                const totalPosts = videos.length;
                const onlineCount = 6; 

                content = `
                    <div class="p-5 space-y-4">
                        <h2 class="text-sm font-bold uppercase tracking-widest text-zinc-400">Community Stats</h2>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="stats-card"><p class="text-[9px] text-zinc-500 uppercase">Online</p><p class="text-xl font-bold text-green-500">${onlineCount}</p></div>
                            <div class="stats-card"><p class="text-[9px] text-zinc-500 uppercase">Total Users</p><p class="text-xl font-bold">${totalUsers}</p></div>
                            <div class="stats-card"><p class="text-[9px] text-zinc-500 uppercase">Total Posts</p><p class="text-xl font-bold">${totalPosts}</p></div>
                            <div class="stats-card"><p class="text-[9px] text-zinc-500 uppercase">Most Liked</p><p class="text-xs font-bold text-[#24A1DE]">N/A</p></div>
                        </div>
                        <div class="mt-4 bg-zinc-900/40 p-6 rounded-2xl border border-zinc-800 text-center">
                            <i class="fa-solid fa-trophy text-yellow-500 text-3xl mb-3"></i>
                            <h3 class="font-bold text-sm uppercase">Trending Content</h3>
                            <p class="text-[10px] text-zinc-500 mt-2 px-4 italic leading-relaxed">Most liked and viewed videos are now featured in the community library.</p>
                        </div>
                    </div>
                `;
            }

            else if (currentTab === 'account') {
                content = `
                    <div class="p-5">
                        <div class="flex items-center gap-4 mb-8 bg-zinc-900/50 p-4 rounded-2xl border border-zinc-800">
                            <div class="w-16 h-16 bg-[#24A1DE] rounded-full flex items-center justify-center text-2xl font-black">${user.first_name[0]}</div>
                            <div>
                                <h2 class="font-bold text-lg">${user.first_name}</h2>
                                <p class="text-[10px] text-zinc-500">UID: ${userTgId}</p>
                            </div>
                        </div>
                        
                        <div class="space-y-4">
                            <label class="text-[10px] uppercase font-bold text-zinc-500 ml-1">Account Language</label>
                            <select id="lang" onchange="window.updateLang(this.value)" class="w-full p-4 rounded-xl text-sm appearance-none">
                                <option value="en" ${users[userTgId]?.lang === 'en' ? 'selected' : ''}>English (EN)</option>
                                <option value="bn" ${users[userTgId]?.lang === 'bn' ? 'selected' : ''}>Bengali (BN)</option>
                            </select>
                        </div>

                        <div class="mt-10 p-4 border border-zinc-900 rounded-xl text-center">
                            <p class="text-[9px] text-zinc-600 uppercase tracking-tighter">Your uploads will appear here after publishing</p>
                        </div>
                    </div>
                `;
            }

            root.innerHTML = header + `<main class="pb-24">${content}</main>` + `
                <nav class="fixed bottom-0 w-full bg-[#0f0f0f] border-t border-zinc-800 flex justify-around py-2 z-50">
                    <button onclick="window.go('home')" class="nav-item ${currentTab === 'home'?'active':''}"><i class="fa-solid fa-house text-lg"></i><span>Home</span></button>
                    <button onclick="window.go('shorts')" class="nav-item ${currentTab === 'shorts'?'active':''}"><i class="fa-solid fa-bolt text-lg"></i><span>Shorts</span></button>
                    <button onclick="window.go('upload')" class="nav-item ${currentTab === 'upload'?'active':''}"><i class="fa-solid fa-circle-plus text-3xl"></i></button>
                    <button onclick="window.go('library')" class="nav-item ${currentTab === 'library'?'active':''}"><i class="fa-solid fa-layer-group text-lg"></i><span>Library</span></button>
                    <button onclick="window.go('account')" class="nav-item ${currentTab === 'account'?'active':''}"><i class="fa-solid fa-circle-user text-lg"></i><span>Account</span></button>
                </nav>
            `;
        }

        window.go = (t) => { currentTab = t; render(); };
        window.openBot = () => { tg.openTelegramLink(`https://t.me/${BOT_USERNAME}`); };

        window.updateLang = (l) => {
            update(ref(db, `users/${userTgId}`), { lang: l });
            tg.showScanQrPopup({ text: "Language updated successfully!" });
            setTimeout(() => tg.closeScanQrPopup(), 2000);
        };
        
        window.saveVideo = () => {
            const data = {
                title: document.getElementById('t').value,
                thumb: document.getElementById('th').value,
                url: document.getElementById('u').value,
                duration: document.getElementById('dur').value,
                adsToUnlock: document.getElementById('unl').value || 0,
                uploaderId: userTgId,
                uploaderName: user.first_name,
                views: 0, likes: 0, date: Date.now()
            };
            if(data.title && data.thumb) {
                push(ref(db, 'videos'), data);
                window.go('home');
            }
        };

    </script>
</body>
</html>
