<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamX Ultimate Pro</title>
    
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src='//libtl.com/sdk.js' data-zone='10803234' data-sdk='show_10803234'></script>
    <script src="https://sad.adsgram.ai/js/sdk.js"></script>

    <style>
        /* Global Styles */
        body { 
            background-color: #0f0f0f; 
            color: #ffffff; 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
        }

        /* Navigation Styles */
        .nav-item { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            color: #71717a; 
            font-size: 10px; 
            cursor: pointer; 
            transition: all 0.3s ease; 
        }
        .nav-item.active { 
            color: #24A1DE; 
        }

        /* Video Card Styles */
        .video-card { 
            background: #18181b; 
            border-radius: 16px; 
            overflow: hidden; 
            margin-bottom: 24px; 
            border: 1px solid #27272a;
        }

        /* Balance Card Styles */
        .balance-card { 
            background: linear-gradient(135deg, #24A1DE 0%, #1d4ed8 100%); 
            border-radius: 28px; 
            padding: 30px; 
            box-shadow: 0 15px 35px rgba(36, 161, 222, 0.25);
        }

        /* Input Styles */
        input, select, textarea { 
            background: #18181b !important; 
            border: 1px solid #27272a !important; 
            color: #ffffff !important; 
            padding: 16px; 
            border-radius: 14px; 
            width: 100%; 
            outline: none; 
            font-size: 14px;
        }
        input:focus { border-color: #24A1DE !important; }

        /* Animation for Ad Popup */
        #adPopup { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.98); 
            z-index: 10000; 
            display: none; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
        }

        /* Shorts Grid */
        .shorts-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2px;
        }
        .short-box {
            aspect-ratio: 9/16;
            background: #18181b;
            position: relative;
            overflow: hidden;
        }

        /* Library Stats */
        .stat-box {
            background: #18181b;
            padding: 20px;
            border-radius: 20px;
            border: 1px solid #27272a;
            text-align: center;
        }

        /* Player UI Layer */
        #videoOverlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            z-index: 9999;
            display: none;
            overflow-y: auto;
        }
    </style>
</head>
<body>

    <div id="adPopup">
        <div class="relative">
            <div class="w-20 h-20 border-4 border-zinc-800 border-t-[#24A1DE] rounded-full animate-spin"></div>
            <i class="fa-solid fa-bolt absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 text-[#24A1DE] text-2xl"></i>
        </div>
        <h2 class="text-2xl font-black mt-8 tracking-tighter">PREMIUM AD</h2>
        <p class="text-zinc-500 text-[10px] uppercase mt-2 tracking-widest">Resuming content in 5 seconds...</p>
    </div>

    <div id="videoOverlay">
        <div class="sticky top-0 bg-black/90 p-4 flex justify-between items-center z-[10001] backdrop-blur-xl">
            <button onclick="hidePlayer()" class="w-10 h-10 bg-zinc-900 rounded-full flex items-center justify-center text-xl"><i class="fa-solid fa-xmark"></i></button>
            <span class="text-xs font-black text-[#24A1DE] italic">STREAMX PLAYER</span>
            <button onclick="shareActive()" class="w-10 h-10 bg-zinc-900 rounded-full flex items-center justify-center text-xl"><i class="fa-solid fa-share-nodes"></i></button>
        </div>
        <video id="mainVid" controls class="w-full aspect-video bg-zinc-900"></video>
        <div id="vidInfo" class="p-6">
            </div>
    </div>

    <div id="app">
        <header class="p-5 flex justify-between items-center sticky top-0 bg-[#0f0f0f] z-50 border-b border-zinc-900/50">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-[#24A1DE] rounded-lg flex items-center justify-center font-black italic">S</div>
                <span class="font-black italic text-xl tracking-tighter">STREAMX</span>
            </div>
            <div class="flex items-center gap-5">
                <i class="fa-solid fa-magnifying-glass text-zinc-500 text-lg" onclick="tg.showAlert('Search feature coming soon')"></i>
                <div id="adminTag" class="hidden">
                    <button onclick="setTab('admin')" class="text-[10px] font-black text-red-500 bg-red-500/10 px-3 py-1 rounded-full border border-red-500/20">ADMIN</button>
                </div>
            </div>
        </header>

        <main id="content" class="pb-32 px-4 pt-4"></main>

        <nav class="fixed bottom-0 w-full bg-[#0f0f0f]/95 backdrop-blur-xl border-t border-zinc-900 flex justify-around items-end pb-5 pt-3 z-50">
            <div onclick="setTab('home')" id="n-home" class="nav-item active">
                <i class="fa-solid fa-house-chimney text-xl"></i><span class="mt-1 font-bold">Home</span>
            </div>
            <div onclick="setTab('shorts')" id="n-shorts" class="nav-item">
                <i class="fa-solid fa-bolt text-xl"></i><span class="mt-1 font-bold">Shorts</span>
            </div>
            <div onclick="setTab('upload')" id="n-upload" class="nav-item -mb-1">
                <div class="w-14 h-14 bg-[#24A1DE] rounded-full flex items-center justify-center shadow-lg shadow-blue-500/30">
                    <i class="fa-solid fa-plus text-white text-2xl"></i>
                </div>
            </div>
            <div onclick="setTab('library')" id="n-library" class="nav-item">
                <i class="fa-solid fa-folder-tree text-xl"></i><span class="mt-1 font-bold">Library</span>
            </div>
            <div onclick="setTab('account')" id="n-account" class="nav-item">
                <i class="fa-solid fa-user-gear text-xl"></i><span class="mt-1 font-bold">Account</span>
            </div>
        </nav>
    </div>

    <script type="module">
        // ---------------------------------------------------------
        // 1. FIREBASE CONFIGURATION
        // ---------------------------------------------------------
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, push, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYaSQbU380U6hcUmBgkDr4WAEmEu45X_U",
            authDomain: "tonnow-pro.firebaseapp.com",
            databaseURL: "https://tonnow-pro-default-rtdb.firebaseio.com",
            projectId: "tonnow-pro",
            storageBucket: "tonnow-pro.firebasestorage.app",
            messagingSenderId: "585362095075",
            appId: "1:585362095075:web:a94096a650ab74f3e03ed6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tg = window.Telegram.WebApp;
        
        // Telegram User Data
        const user = tg.initDataUnsafe?.user || { id: "8382029741", first_name: "Developer" };
        const userTgId = user.id.toString();
        const ADMIN_ID = "8382029741"; 

        // App State
        let activeTab = 'home';
        let videoData = [];
        let profileData = { verified: false, adPoints: 0, lang: 'bn', posts: 0 };
        let adTimerRef;
        let currentPlayingId = null;

        // ---------------------------------------------------------
        // 2. LANGUAGE CONFIGURATION
        // ---------------------------------------------------------
        const langData = {
            en: { h: "Home", s: "Shorts", l: "Library", a: "Account", u: "Upload", b: "Balance", w: "Withdraw", v: "Verify", pts: "Points", pop: "Popular" },
            bn: { h: "হোম", s: "শর্টস", l: "লাইব্রেরি", a: "অ্যাকাউন্ট", u: "আপলোড", b: "ব্যালেন্স", w: "উইথড্র", v: "ভেরিফাই", pts: "পয়েন্ট", pop: "জনপ্রিয়" },
            ru: { h: "Главная", s: "Шорты", l: "Инфо", a: "Аккаунт", u: "Создать", b: "Баланс", w: "Вывод", v: "Бот", pts: "Баллы", pop: "Популярный" }
        };

        // ---------------------------------------------------------
        // 3. CORE SYSTEM FUNCTIONS (Ads, Tabs, Player)
        // ---------------------------------------------------------
        
        // Ad Triggering Logic
        function initiateAdCycle() {
            clearInterval(adTimerRef);
            adTimerRef = setInterval(() => {
                if(activeTab === 'home' || activeTab === 'shorts') {
                    showRealAdPopup();
                }
            }, 60000); // 1 Minute Loop
        }

        async function showRealAdPopup() {
            document.getElementById('adPopup').style.display = 'flex';
            
            // Try Adsgram First (ID: 2627)
            const AdController = window.Adsgram?.init({ blockId: "2627" });
            if(AdController) {
                AdController.show().then(() => finalizeAd()).catch(() => fallbackMonetag());
            } else {
                fallbackMonetag();
            }
        }

        function fallbackMonetag() {
            if(window.show_10803234) {
                window.show_10803234();
                setTimeout(finalizeAd, 5000);
            } else {
                setTimeout(finalizeAd, 5000);
            }
        }

        function finalizeAd() {
            document.getElementById('adPopup').style.display = 'none';
            const updatedPoints = (profileData.adPoints || 0) + 1;
            update(ref(db, `users/${userTgId}`), { adPoints: updatedPoints });
            tg.showAlert("Ad Viewed! +1 Point Added to your balance.");
        }

        // Tab Switching
        window.setTab = (t) => {
            activeTab = t;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`n-${t}`).classList.add('active');
            renderApp();
            if(t !== 'home' && t !== 'shorts') clearInterval(adTimerRef);
            else initiateAdCycle();
        };

        // Video Player Management
        window.showPlayer = (id) => {
            currentPlayingId = id;
            const v = videoData.find(item => item.id === id);
            if(!v) return;

            const player = document.getElementById('mainVid');
            player.src = v.url;
            document.getElementById('videoOverlay').style.display = 'block';
            player.play();

            // Update Views
            const currentViews = (v.views || 0) + 1;
            update(ref(db, `videos/${id}`), { views: currentViews });

            // Reward Owner
            if(v.uploaderId !== userTgId) {
                get(ref(db, `users/${v.uploaderId}/adPoints`)).then((snap) => {
                    const ownerPts = snap.val() || 0;
                    update(ref(db, `users/${v.uploaderId}`), { adPoints: ownerPts + 1 });
                });
            }

            // Render Social Actions
            document.getElementById('vidInfo').innerHTML = `
                <div class="flex justify-between items-start">
                    <h1 class="text-xl font-bold leading-tight flex-1 mr-4">${v.title}</h1>
                    <div class="bg-zinc-900 px-3 py-1 rounded-full text-[10px] font-bold text-zinc-400">${v.duration || '00:00'}</div>
                </div>
                <p class="text-xs text-zinc-500 mt-2 uppercase font-bold tracking-widest">${v.uploaderName} • ${currentViews} Views</p>
                
                <div class="flex justify-around py-8 border-y border-zinc-900 mt-6">
                    <div class="flex flex-col items-center gap-1 group" onclick="window.handleLike('${id}')">
                        <i class="fa-solid fa-heart text-2xl text-zinc-600 group-active:text-red-500"></i>
                        <span class="text-[10px] font-black">${v.likes || 0}</span>
                    </div>
                    <div class="flex flex-col items-center gap-1" onclick="window.handleComment()">
                        <i class="fa-solid fa-comment-dots text-2xl text-zinc-600"></i>
                        <span class="text-[10px] font-black">Comment</span>
                    </div>
                    <div class="flex flex-col items-center gap-1" onclick="window.shareActive()">
                        <i class="fa-solid fa-share-nodes text-2xl text-zinc-600"></i>
                        <span class="text-[10px] font-black">Share</span>
                    </div>
                    <div class="flex flex-col items-center gap-1" onclick="window.handleDownload('${v.url}')">
                        <i class="fa-solid fa-circle-arrow-down text-2xl text-zinc-600"></i>
                        <span class="text-[10px] font-black">Download</span>
                    </div>
                </div>
                
                <div class="mt-8">
                    <h3 class="text-xs font-black uppercase text-zinc-600 tracking-widest mb-4">Related Content</h3>
                    <div id="relatedList" class="space-y-4"></div>
                </div>
            `;
            
            // Render Related
            const related = videoData.filter(x => x.id !== id).slice(0, 5);
            document.getElementById('relatedList').innerHTML = related.map(rv => `
                <div class="flex gap-4" onclick="showPlayer('${rv.id}')">
                    <img src="${rv.thumb}" class="w-32 aspect-video rounded-xl object-cover">
                    <div>
                        <h4 class="text-sm font-bold line-clamp-1">${rv.title}</h4>
                        <p class="text-[9px] text-zinc-500 mt-1">${rv.uploaderName}</p>
                    </div>
                </div>
            `).join('');
        };

        window.hidePlayer = () => {
            document.getElementById('videoOverlay').style.display = 'none';
            document.getElementById('mainVid').pause();
        };

        window.handleLike = (id) => {
            const v = videoData.find(x => x.id === id);
            update(ref(db, `videos/${id}`), { likes: (v.likes || 0) + 1 });
            tg.showAlert("You liked this video!");
        };

        window.handleComment = () => { tg.showAlert("Comments will be available in next update!"); };
        window.shareActive = () => { 
            const v = videoData.find(x => x.id === currentPlayingId);
            tg.shareLink(v.url, `Check out ${v.title} on StreamX!`); 
        };
        window.handleDownload = (url) => { window.open(url, '_blank'); tg.showAlert("Starting Download..."); };

        // ---------------------------------------------------------
        // 4. RENDER ENGINE (UI BUILDER)
        // ---------------------------------------------------------
        function renderApp() {
            const root = document.getElementById('content');
            const isAdmin = (userTgId === ADMIN_ID);
            const t = langData[profileData.lang || 'en'];

            if(isAdmin) document.getElementById('adminTag').classList.remove('hidden');

            // --- HOME VIEW ---
            if (activeTab === 'home') {
                root.innerHTML = `
                    <div class="mb-6">
                        <h2 class="text-2xl font-black italic tracking-tighter">Recommended</h2>
                        <p class="text-[10px] text-zinc-500 uppercase tracking-widest">Videos chosen for you</p>
                    </div>
                    ${videoData.map(v => `
                        <div class="video-card" onclick="showPlayer('${v.id}')">
                            <div class="relative">
                                <img src="${v.thumb}" class="w-full aspect-video object-cover">
                                <div class="absolute bottom-3 right-3 bg-black/80 px-2 py-1 rounded text-[10px] font-black">${v.duration || '00:00'}</div>
                            </div>
                            <div class="p-4 flex gap-4">
                                <div class="w-12 h-12 bg-zinc-900 border border-zinc-800 rounded-full flex items-center justify-center font-black text-[#24A1DE] text-xl">${v.uploaderName[0]}</div>
                                <div class="flex-1">
                                    <h3 class="font-bold text-base line-clamp-2 leading-snug">${v.title}</h3>
                                    <p class="text-xs text-zinc-500 mt-1">${v.uploaderName} • ${v.views || 0} Views • ${new Date(v.date).toLocaleDateString()}</p>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                `;
            }

            // --- SHORTS VIEW ---
            else if (activeTab === 'shorts') {
                root.innerHTML = `
                    <div class="mb-6 flex items-center gap-2">
                        <i class="fa-solid fa-bolt text-[#24A1DE]"></i>
                        <h2 class="text-xl font-black uppercase italic">${t.s}</h2>
                    </div>
                    <div class="shorts-container">
                        ${videoData.map(v => `
                            <div class="short-box" onclick="showPlayer('${v.id}')">
                                <img src="${v.thumb}" class="w-full h-full object-cover">
                                <div class="absolute bottom-2 left-2 flex items-center gap-1">
                                    <i class="fa-solid fa-play text-[8px]"></i>
                                    <span class="text-[9px] font-bold">${v.views || 0}</span>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            // --- LIBRARY VIEW ---
            else if (activeTab === 'library') {
                root.innerHTML = `
                    <div class="space-y-6">
                        <h2 class="text-xl font-black uppercase italic tracking-widest text-zinc-500">${t.l}</h2>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="stat-box">
                                <i class="fa-solid fa-users text-2xl text-[#24A1DE] mb-2"></i>
                                <p class="text-2xl font-black">742</p>
                                <p class="text-[9px] uppercase text-zinc-500">Users Online</p>
                            </div>
                            <div class="stat-box">
                                <i class="fa-solid fa-clapperboard text-2xl text-green-500 mb-2"></i>
                                <p class="text-2xl font-black">${videoData.length}</p>
                                <p class="text-[9px] uppercase text-zinc-500">Total Content</p>
                            </div>
                        </div>
                        <div class="bg-zinc-900/50 p-6 rounded-3xl border border-zinc-800">
                            <div class="flex items-center gap-4 mb-4">
                                <i class="fa-solid fa-clock-rotate-left text-xl text-zinc-400"></i>
                                <h3 class="font-bold">Recent History</h3>
                            </div>
                            <div class="space-y-4">
                                ${videoData.slice(0,3).map(v => `
                                    <div class="flex gap-4 items-center">
                                        <img src="${v.thumb}" class="w-16 h-10 rounded-lg object-cover">
                                        <p class="text-xs font-bold line-clamp-1">${v.title}</p>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    </div>
                `;
            }

            // --- UPLOAD VIEW ---
            else if (activeTab === 'upload') {
                if (!profileData.verified && !isAdmin) {
                    root.innerHTML = `
                        <div class="flex flex-col items-center justify-center min-h-[60vh] text-center p-8">
                            <div class="w-24 h-24 bg-red-500/10 rounded-full flex items-center justify-center mb-6">
                                <i class="fa-solid fa-shield-halved text-4xl text-red-500"></i>
                            </div>
                            <h2 class="text-2xl font-black uppercase italic">Access Denied</h2>
                            <p class="text-zinc-500 text-sm mt-4 mb-10">You must verify your account through our official Telegram Bot to unlock video uploads.</p>
                            <button onclick="tg.openTelegramLink('https://t.me/YourBotUser')" class="w-full bg-white text-black py-5 rounded-2xl font-black uppercase tracking-widest shadow-xl">Confirm via Bot</button>
                        </div>`;
                } else {
                    root.innerHTML = `
                        <div class="space-y-6 animate-fadeIn">
                            <h2 class="text-xl font-black uppercase italic text-[#24A1DE]">Publish Video</h2>
                            <div class="space-y-4">
                                <input id="v_title" placeholder="Enter Catchy Title">
                                <input id="v_thumb" placeholder="Thumbnail Image URL">
                                <input id="v_url" placeholder="Direct Video MP4 URL">
                                <input id="v_dur" placeholder="Duration (e.g., 05:40)">
                                <button onclick="window.executePublish()" class="w-full bg-[#24A1DE] py-5 rounded-2xl font-black uppercase tracking-widest text-sm shadow-lg shadow-blue-500/20">Publish Post</button>
                            </div>
                        </div>`;
                }
            }

            // --- ACCOUNT VIEW ---
            else if (activeTab === 'account') {
                const balance = ((profileData.adPoints || 0) / 1000) * 10;
                root.innerHTML = `
                    <div class="space-y-8">
                        <div class="flex items-center gap-5">
                            <div class="w-20 h-20 rounded-full bg-zinc-900 border-4 border-zinc-800 flex items-center justify-center text-3xl font-black text-[#24A1DE] uppercase">${user.first_name[0]}</div>
                            <div>
                                <h2 class="text-2xl font-black italic leading-none">${user.first_name}</h2>
                                <p class="text-xs text-zinc-500 mt-2">ID: ${user.id}</p>
                                <span class="inline-block mt-2 bg-[#24A1DE]/10 text-[#24A1DE] text-[8px] font-black px-2 py-1 rounded-full uppercase tracking-widest">Creator Pro</span>
                            </div>
                        </div>

                        <div class="balance-card">
                            <p class="text-[10px] font-black uppercase opacity-70 tracking-widest">Total Earnings</p>
                            <div class="flex items-baseline gap-2 mt-2">
                                <h1 class="text-5xl font-black tracking-tighter">$${balance.toFixed(2)}</h1>
                                <span class="text-lg font-bold opacity-60">USD</span>
                            </div>
                            <div class="flex justify-between items-center mt-8 pt-5 border-t border-white/10">
                                <div class="flex flex-col">
                                    <span class="text-[9px] font-black uppercase opacity-60">Ad Points</span>
                                    <span class="text-lg font-black">${profileData.adPoints || 0} / 1000</span>
                                </div>
                                <button onclick="tg.showAlert('Minimum $10 required')" class="bg-white text-[#24A1DE] px-8 py-3 rounded-full font-black text-[10px] uppercase shadow-lg">Withdraw</button>
                            </div>
                        </div>

                        <div class="grid grid-cols-2 gap-4">
                            <div class="bg-zinc-900 p-6 rounded-3xl border border-zinc-800">
                                <p class="text-3xl font-black">${profileData.posts || 0}</p>
                                <p class="text-[9px] font-black text-zinc-500 uppercase mt-1">My Posts</p>
                            </div>
                            <div class="bg-zinc-900 p-6 rounded-3xl border border-zinc-800">
                                <p class="text-3xl font-black text-pink-500">0</p>
                                <p class="text-[9px] font-black text-zinc-500 uppercase mt-1">Total Likes</p>
                            </div>
                        </div>

                        <div class="space-y-4">
                            <h3 class="text-xs font-black uppercase text-zinc-600 tracking-widest">Language Settings</h3>
                            <select onchange="window.updateLang(this.value)">
                                <option value="en" ${profileData.lang==='en'?'selected':''}>English (US)</option>
                                <option value="bn" ${profileData.lang==='bn'?'selected':''}>Bengali (BD)</option>
                                <option value="ru" ${profileData.lang==='ru'?'selected':''}>Russian (RU)</option>
                            </select>
                        </div>
                    </div>
                `;
            }

            // --- ADMIN VIEW ---
            else if (activeTab === 'admin' && isAdmin) {
                root.innerHTML = `
                    <div class="space-y-6">
                        <h2 class="text-xl font-black uppercase italic text-red-500">System Admin</h2>
                        <div class="bg-red-500/5 p-6 rounded-3xl border border-red-500/20">
                            <p class="text-xs font-bold text-red-500 mb-4 tracking-widest uppercase">Global Ad Config</p>
                            <div class="space-y-4">
                                <input placeholder="Adsgram Block ID" value="2627">
                                <input placeholder="Monetag Zone ID" value="10803234">
                                <button onclick="tg.showAlert('Settings Updated')" class="w-full bg-red-600 py-4 rounded-xl font-black text-xs uppercase">Update Configuration</button>
                            </div>
                        </div>
                        <div class="bg-zinc-900 p-6 rounded-3xl border border-zinc-800">
                            <p class="text-xs font-bold text-zinc-500 mb-4 tracking-widest uppercase">Platform Stats</p>
                            <div class="space-y-2">
                                <div class="flex justify-between"><span class="text-xs">Total Users</span><span class="font-bold">1,204</span></div>
                                <div class="flex justify-between"><span class="text-xs">Total Videos</span><span class="font-bold">${videoData.length}</span></div>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        // ---------------------------------------------------------
        // 5. DATA MANAGEMENT (POSTING, UPDATING)
        // ---------------------------------------------------------
        
        // Initial Fetch
        onValue(ref(db, 'videos'), (s) => { 
            videoData = s.val() ? Object.entries(s.val()).map(([id, v]) => ({id, ...v})).reverse() : [];
            renderApp();
        });

        onValue(ref(db, `users/${userTgId}`), (s) => {
            if(s.val()) profileData = s.val();
            renderApp();
        });

        window.executePublish = () => {
            const title = document.getElementById('v_title').value;
            const thumb = document.getElementById('v_thumb').value;
            const url = document.getElementById('v_url').value;
            const dur = document.getElementById('v_dur').value;

            if(!title || !url) return tg.showAlert("Please fill Title and URL!");

            const newVideo = {
                title, thumb, url,
                duration: dur,
                uploaderId: userTgId,
                uploaderName: user.first_name,
                views: 0, likes: 0, date: Date.now()
            };

            push(ref(db, 'videos'), newVideo).then(() => {
                const currentPostCount = (profileData.posts || 0) + 1;
                update(ref(db, `users/${userTgId}`), { posts: currentPostCount });
                tg.showAlert("Video Published Successfully!");
                setTab('home');
            });
        };

        window.updateLang = (l) => {
            update(ref(db, `users/${userTgId}`), { lang: l });
            tg.showAlert("Language Updated!");
        };

        // Initialize App
        setTab('home');
        initiateAdCycle();

    </script>
</body>
</html>
