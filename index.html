<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamX - Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background-color: #0f0f0f; color: white; margin: 0; font-family: 'Roboto', sans-serif; overflow-x: hidden; }
        .nav-item { color: #aaaaaa; font-size: 10px; display: flex; flex-direction: column; align-items: center; cursor: pointer; }
        .nav-item.active { color: #24A1DE; }
        input, select { background-color: #1a1a1a !important; border: 1px solid #333 !important; color: white !important; outline: none; }
        .admin-card { background: linear-gradient(145deg, #1e1e1e, #141414); border: 1px dashed #444; border-radius: 16px; padding: 20px; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, remove, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYaSQbU380U6hcUmBgkDr4WAEmEu45X_U",
            authDomain: "tonnow-pro.firebaseapp.com",
            databaseURL: "https://tonnow-pro-default-rtdb.firebaseio.com",
            projectId: "tonnow-pro",
            storageBucket: "tonnow-pro.firebasestorage.app",
            messagingSenderId: "585362095075",
            appId: "1:585362095075:web:a94096a650ab74f3e03ed6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe?.user || { id: "8382029741", first_name: "Guest" };
        const userTgId = user.id.toString();
        
        // --- Admin Configuration ---
        const MY_ADMIN_ID = "8382029741"; // এখানে আপনার সঠিক অ্যাডমিন আইডি দিন

        let currentTab = 'home';
        let videos = [];
        let users = {};
        let adConfig = { monetag: '', adsgram: '' };

        // Realtime Data Sync
        onValue(ref(db, 'videos'), (s) => { videos = s.val() ? Object.entries(s.val()).map(([id,v]) => ({id,...v})).reverse() : []; render(); });
        onValue(ref(db, 'users'), (s) => { users = s.val() || {}; render(); });
        onValue(ref(db, 'adConfig'), (s) => { if(s.val()) adConfig = s.val(); render(); });

        function render() {
            const root = document.getElementById('app');
            let content = '';

            // Header logic: Only show Admin button for Admin ID
            const isAdmin = (userTgId === MY_ADMIN_ID);
            const header = `
                <header class="p-3 px-4 flex justify-between items-center sticky top-0 bg-[#0f0f0f] z-50 border-b border-zinc-900">
                    <div class="flex items-center gap-2">
                        <i class="fa-brands fa-telegram text-[#24A1DE] text-2xl"></i>
                        <span class="text-white font-bold text-md italic uppercase">Telegram</span>
                    </div>
                    ${isAdmin ? `<button onclick="window.go('admin')" class="text-[10px] bg-red-600/20 text-red-500 px-3 py-1 rounded-full border border-red-500/30 font-bold uppercase"><i class="fa-solid fa-user-shield mr-1"></i> Admin</button>` : `<i class="fa-solid fa-magnifying-glass text-zinc-400"></i>`}
                </header>
            `;

            if (currentTab === 'home') {
                content = videos.map(v => `
                    <div class="mb-4">
                        <img src="${v.thumb}" class="w-full aspect-video object-cover">
                        <div class="p-3 flex gap-3">
                            <div class="w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center">${v.uploaderName[0]}</div>
                            <div>
                                <h3 class="text-sm font-medium line-clamp-1">${v.title}</h3>
                                <p class="text-[10px] text-zinc-500">${v.views || 0} views • ${v.uploaderName}</p>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            else if (currentTab === 'admin' && isAdmin) {
                content = `
                    <div class="p-5 space-y-6">
                        <h2 class="text-lg font-bold text-red-500 uppercase italic underline decoration-2 offset-4 tracking-tighter">Admin Panel Settings</h2>
                        
                        <div class="admin-card space-y-4">
                            <h3 class="text-xs font-bold text-zinc-400 uppercase tracking-widest flex items-center gap-2">
                                <i class="fa-solid fa-rectangle-ad text-[#24A1DE]"></i> Ad Network Configuration
                            </h3>
                            <div>
                                <label class="text-[10px] text-zinc-500 ml-1">Monetag Zone ID</label>
                                <input id="monetagId" class="w-full p-4 mt-1 rounded-xl text-sm" placeholder="Enter Monetag ID" value="${adConfig.monetag}">
                            </div>
                            <div>
                                <label class="text-[10px] text-zinc-500 ml-1">Adsgram Block ID</label>
                                <input id="adsgramId" class="w-full p-4 mt-1 rounded-xl text-sm" placeholder="Enter Adsgram ID" value="${adConfig.adsgram}">
                            </div>
                            <button onclick="window.saveAds()" class="w-full bg-[#24A1DE] py-4 rounded-xl font-bold uppercase text-xs tracking-widest">Update Ad Settings</button>
                        </div>

                        <div class="p-4 bg-zinc-900 rounded-xl border border-zinc-800">
                            <p class="text-[10px] text-zinc-500 text-center italic">Only you can see this section. Users cannot access these IDs.</p>
                        </div>
                    </div>
                `;
            }

            else if (currentTab === 'upload') {
                content = `
                    <div class="p-5 space-y-4">
                        <h2 class="text-[#24A1DE] font-bold italic tracking-tight uppercase"><i class="fa-solid fa-plus mr-1"></i> New Content</h2>
                        <input id="t" class="w-full p-4 rounded-xl text-sm" placeholder="Post Title">
                        <input id="th" class="w-full p-4 rounded-xl text-sm" placeholder="Thumbnail Image URL">
                        <input id="u" class="w-full p-4 rounded-xl text-sm" placeholder="Video MP4 Link">
                        <div class="flex gap-2">
                            <input id="dur" class="w-1/2 p-4 rounded-xl text-sm" placeholder="Duration (05:00)">
                            <input id="unl" type="number" class="w-1/2 p-4 rounded-xl text-sm" placeholder="Ads to Unlock">
                        </div>
                        <button onclick="window.saveVideo()" class="w-full bg-[#24A1DE] py-4 rounded-xl font-bold uppercase mt-2">Publish Now</button>
                    </div>
                `;
            }

            else if (currentTab === 'account') {
                content = `
                    <div class="p-5">
                        <div class="flex items-center gap-4 mb-8 bg-zinc-900/50 p-4 rounded-2xl border border-zinc-800">
                            <div class="w-16 h-16 bg-[#24A1DE] rounded-full flex items-center justify-center text-2xl font-black">${user.first_name[0]}</div>
                            <div>
                                <h2 class="font-bold text-lg">${user.first_name} ${isAdmin ? '👑' : ''}</h2>
                                <p class="text-[10px] text-zinc-500">UID: ${userTgId}</p>
                            </div>
                        </div>
                        <div class="space-y-4">
                            <label class="text-[10px] uppercase font-bold text-zinc-500 ml-1">Account Language</label>
                            <select class="w-full p-4 rounded-xl text-sm appearance-none">
                                <option value="en">English (EN)</option>
                                <option value="bn">Bengali (BN)</option>
                            </select>
                        </div>
                    </div>
                `;
            }

            // Fallback for non-admin accessing admin tab
            if (currentTab === 'admin' && !isAdmin) { currentTab = 'home'; render(); return; }

            root.innerHTML = header + `<main class="pb-24">${content}</main>` + `
                <nav class="fixed bottom-0 w-full bg-[#0f0f0f] border-t border-zinc-800 flex justify-around py-2 z-50">
                    <button onclick="window.go('home')" class="nav-item ${currentTab === 'home'?'active':''}"><i class="fa-solid fa-house text-lg"></i><span>Home</span></button>
                    <button onclick="window.go('shorts')" class="nav-item ${currentTab === 'shorts'?'active':''}"><i class="fa-solid fa-bolt text-lg"></i><span>Shorts</span></button>
                    <button onclick="window.go('upload')" class="nav-item ${currentTab === 'upload'?'active':''}"><i class="fa-solid fa-circle-plus text-3xl"></i></button>
                    <button onclick="window.go('library')" class="nav-item ${currentTab === 'library'?'active':''}"><i class="fa-solid fa-layer-group text-lg"></i><span>Library</span></button>
                    <button onclick="window.go('account')" class="nav-item ${currentTab === 'account'?'active':''}"><i class="fa-solid fa-circle-user text-lg"></i><span>Account</span></button>
                </nav>
            `;
        }

        window.go = (t) => { currentTab = t; render(); };

        window.saveAds = () => {
            const monetag = document.getElementById('monetagId').value;
            const adsgram = document.getElementById('adsgramId').value;
            set(ref(db, 'adConfig'), { monetag, adsgram }).then(() => {
                tg.showAlert("Ad IDs Updated Successfully!");
            });
        };

        window.saveVideo = () => {
            const data = {
                title: document.getElementById('t').value,
                thumb: document.getElementById('th').value,
                url: document.getElementById('u').value,
                duration: document.getElementById('dur').value,
                adsToUnlock: document.getElementById('unl').value || 0,
                uploaderId: userTgId,
                uploaderName: user.first_name,
                date: Date.now()
            };
            if(data.title && data.thumb) {
                push(ref(db, 'videos'), data);
                window.go('home');
            }
        };

        render();
    </script>
</body>
</html>
