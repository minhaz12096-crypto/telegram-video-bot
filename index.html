<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamX - Ultimate</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        body { background-color: #0f0f0f; color: white; margin: 0; font-family: 'Roboto', sans-serif; overflow-x: hidden; }
        .nav-item { color: #aaaaaa; font-size: 10px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: #24A1DE; }
        input, select { background-color: #1a1a1a !important; border: 1px solid #333 !important; color: white !important; outline: none; width: 100%; padding: 14px; border-radius: 14px; font-size: 14px; }
        .stats-card { background: #161616; border: 1px solid #222; border-radius: 16px; padding: 15px; }
        .balance-card { background: linear-gradient(135deg, #24A1DE, #1474a1); border-radius: 24px; padding: 25px; box-shadow: 0 10px 20px rgba(36, 161, 222, 0.2); }
        .admin-btn { background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.3); padding: 4px 12px; border-radius: 20px; font-size: 10px; font-weight: bold; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push, set, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYaSQbU380U6hcUmBgkDr4WAEmEu45X_U",
            authDomain: "tonnow-pro.firebaseapp.com",
            databaseURL: "https://tonnow-pro-default-rtdb.firebaseio.com",
            projectId: "tonnow-pro",
            storageBucket: "tonnow-pro.firebasestorage.app",
            messagingSenderId: "585362095075",
            appId: "1:585362095075:web:a94096a650ab74f3e03ed6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tg = window.Telegram.WebApp;
        
        // --- System Constants ---
        const user = tg.initDataUnsafe?.user || { id: "8382029741", first_name: "User" };
        const userTgId = user.id.toString();
        const ADMIN_ID = "8382029741"; 
        const BOT_USERNAME = "Filetourllink1bot"; // আপনার বটের ইউজারনেম দিন

        // --- States ---
        let currentTab = 'home';
        let videos = [];
        let users = {};
        let adConfig = { monetag: '', adsgram: '' };
        let currentLang = 'en';

        // --- Multi-Language Support ---
        const i18n = {
            en: { home: "Home", shorts: "Shorts", lib: "Library", acc: "Account", up: "Upload", bal: "Balance", wit: "Withdraw", ads: "Ad Views", verify: "Verify Bot", confirm_msg: "Please confirm your account via bot to unlock uploading." },
            bn: { home: "হোম", shorts: "শর্টস", lib: "লাইব্রেরি", acc: "অ্যাকাউন্ট", up: "আপলোড", bal: "ব্যালেন্স", wit: "উইথড্র", ads: "অ্যাড ভিউ", verify: "বট ভেরিফাই", confirm_msg: "আপলোড শুরু করতে বট থেকে একাউন্ট কনফার্ম করুন।" },
            ru: { home: "Главная", shorts: "Шорты", lib: "Инфо", acc: "Кабинет", up: "Создать", bal: "Баланс", wit: "Вывод", ads: "Реклама", verify: "Бот", confirm_msg: "Подтвердите аккаунт через бота для загрузки." }
        };

        // --- Firebase Listeners ---
        onValue(ref(db, 'videos'), (s) => { videos = s.val() ? Object.entries(s.val()).map(([id,v]) => ({id,...v})).reverse() : []; render(); });
        onValue(ref(db, 'users'), (s) => { 
            users = s.val() || {}; 
            currentLang = users[userTgId]?.lang || 'en';
            render(); 
        });
        onValue(ref(db, 'adConfig'), (s) => { if(s.val()) adConfig = s.val(); render(); });

        function render() {
            const root = document.getElementById('app');
            const isAdmin = (userTgId === ADMIN_ID);
            const isVerified = users[userTgId]?.verified || false;
            const t = i18n[currentLang];
            
            // Stats Calculations
            const myVideos = videos.filter(v => v.uploaderId === userTgId);
            const totalViews = myVideos.reduce((s, v) => s + (v.views || 0), 0);
            const adPoints = users[userTgId]?.adPoints || 0;
            const balance = (adPoints / 1000) * 10;

            let header = `
                <header class="p-4 flex justify-between items-center sticky top-0 bg-[#0f0f0f] z-50 border-b border-zinc-900">
                    <div class="flex items-center gap-3">
                        <select onchange="window.setLang(this.value)" class="!w-20 !p-1 !text-[10px] !bg-zinc-900">
                            <option value="en" ${currentLang==='en'?'selected':''}>EN</option>
                            <option value="bn" ${currentLang==='bn'?'selected':''}>BN</option>
                            <option value="ru" ${currentLang==='ru'?'selected':''}>RU</option>
                        </select>
                        <span class="font-black italic text-lg tracking-tighter">STREAMX</span>
                    </div>
                    ${isAdmin ? `<button onclick="window.go('admin')" class="admin-btn">ADMIN PANEL</button>` : `<i class="fa-solid fa-magnifying-glass text-zinc-500"></i>`}
                </header>
            `;

            let content = '';

            if (currentTab === 'home') {
                content = videos.map(v => `
                    <div class="mb-6" onclick="window.handleVideoClick('${v.id}', '${v.uploaderId}')">
                        <div class="relative">
                            <img src="${v.thumb}" class="w-full aspect-video object-cover">
                            <span class="absolute bottom-2 right-2 bg-black/80 text-[10px] px-2 py-0.5 rounded font-bold">${v.duration || '00:00'}</span>
                        </div>
                        <div class="p-4 flex gap-3">
                            <div class="w-10 h-10 rounded-full bg-zinc-800 flex items-center justify-center font-bold text-[#24A1DE]">${v.uploaderName[0]}</div>
                            <div>
                                <h3 class="text-sm font-semibold line-clamp-2 leading-snug">${v.title}</h3>
                                <p class="text-[10px] text-zinc-500 mt-1 uppercase">${v.uploaderName} • ${v.views || 0} views</p>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            else if (currentTab === 'shorts') {
                content = `<div class="grid grid-cols-3 gap-1 p-1">
                    ${videos.map(v => `<img src="${v.thumb}" class="aspect-[9/16] object-cover bg-zinc-900">`).join('')}
                </div>`;
            }

            else if (currentTab === 'upload') {
                if (!isVerified && !isAdmin) {
                    content = `
                        <div class="p-10 text-center flex flex-col items-center justify-center min-h-[70vh]">
                            <i class="fa-solid fa-robot text-6xl text-[#24A1DE] mb-6"></i>
                            <h2 class="font-black uppercase text-xl">${t.verify}</h2>
                            <p class="text-xs text-zinc-500 mt-2 mb-10 px-6">${t.confirm_msg}</p>
                            <button onclick="window.openBot()" class="w-full bg-[#24A1DE] py-4 rounded-2xl font-black uppercase tracking-widest text-sm shadow-xl shadow-[#24A1DE]/20">Confirm via Bot</button>
                        </div>
                    `;
                } else {
                    content = `
                        <div class="p-6 space-y-4">
                            <h2 class="text-xs font-black uppercase text-zinc-500 tracking-widest mb-4">+ ${t.up}</h2>
                            <input id="t" placeholder="Video Title">
                            <input id="th" placeholder="Thumbnail URL">
                            <input id="u" placeholder="Video MP4 URL">
                            <div class="flex gap-3">
                                <input id="dur" placeholder="Duration (05:00)">
                                <input id="unl" type="number" placeholder="Ads to Unlock">
                            </div>
                            <button onclick="window.saveVideo()" class="w-full bg-[#24A1DE] py-4 rounded-2xl font-black uppercase tracking-widest mt-6 shadow-lg shadow-[#24A1DE]/30">Publish Now</button>
                        </div>
                    `;
                }
            }

            else if (currentTab === 'library') {
                content = `
                    <div class="p-6 space-y-6">
                        <h2 class="text-[10px] font-black uppercase tracking-[0.3em] text-zinc-500">${t.lib} Stats</h2>
                        <div class="grid grid-cols-2 gap-4">
                            <div class="stats-card"><p class="text-[9px] text-zinc-500 uppercase font-bold tracking-widest">Online</p><p class="text-2xl font-black text-green-500">6</p></div>
                            <div class="stats-card"><p class="text-[9px] text-zinc-500 uppercase font-bold tracking-widest">Total Users</p><p class="text-2xl font-black">${Object.keys(users).length}</p></div>
                            <div class="stats-card"><p class="text-[9px] text-zinc-500 uppercase font-bold tracking-widest">Total Posts</p><p class="text-2xl font-black">${videos.length}</p></div>
                            <div class="stats-card"><p class="text-[9px] text-zinc-500 uppercase font-bold tracking-widest">Most Liked</p><p class="text-2xl font-black text-[#24A1DE]">N/A</p></div>
                        </div>
                        <div class="mt-10 p-10 bg-zinc-900/40 rounded-[32px] border border-zinc-800 text-center">
                            <i class="fa-solid fa-trophy text-yellow-500 text-5xl mb-6"></i>
                            <h3 class="font-black uppercase text-sm tracking-widest">Trending Hub</h3>
                            <p class="text-[11px] text-zinc-500 mt-3 leading-relaxed italic opacity-60">High engagement content will appear here.</p>
                        </div>
                    </div>
                `;
            }

            else if (currentTab === 'account') {
                content = `
                    <div class="p-6 space-y-6">
                        <div class="balance-card">
                            <p class="text-[10px] uppercase font-black tracking-widest opacity-70">${t.bal}</p>
                            <h2 class="text-4xl font-black mt-2 tracking-tighter">$${balance.toFixed(2)}</h2>
                            <div class="flex justify-between items-center mt-6 pt-6 border-t border-white/10">
                                <span class="text-[10px] uppercase font-bold opacity-60">${t.ads}: ${adPoints}</span>
                                <button onclick="window.withdraw(${balance})" class="bg-white text-[#24A1DE] px-6 py-2 rounded-full font-black uppercase text-[10px] tracking-widest">Withdraw</button>
                            </div>
                        </div>

                        <div class="grid grid-cols-3 gap-2">
                            <div class="stats-card text-center"><p class="text-xl font-black">${myVideos.length}</p><p class="text-[8px] text-zinc-500 uppercase font-bold">Posts</p></div>
                            <div class="stats-card text-center"><p class="text-xl font-black">${totalViews}</p><p class="text-[8px] text-zinc-500 uppercase font-bold">Views</p></div>
                            <div class="stats-card text-center"><p class="text-xl font-black text-pink-500">0</p><p class="text-[8px] text-zinc-500 uppercase font-bold">Likes</p></div>
                        </div>
                    </div>
                `;
            }

            else if (currentTab === 'admin' && isAdmin) {
                content = `
                    <div class="p-6 space-y-6">
                        <h2 class="text-red-500 font-black uppercase italic tracking-tighter text-xl underline decoration-double">System Core</h2>
                        <div class="p-6 border border-red-500/20 bg-red-500/5 rounded-3xl space-y-4">
                            <label class="text-[10px] font-black text-zinc-500 uppercase tracking-widest">Ad Network Integration</label>
                            <input id="mId" placeholder="Monetag ID" value="${adConfig.monetag}">
                            <input id="aId" placeholder="Adsgram ID" value="${adConfig.adsgram}">
                            <button onclick="window.saveAds()" class="w-full bg-red-600 py-4 rounded-2xl font-black uppercase tracking-widest text-xs mt-4 shadow-lg shadow-red-600/30">Sync Config</button>
                        </div>
                    </div>
                `;
            }

            root.innerHTML = header + `<main class="pb-28">${content}</main>` + `
                <nav class="fixed bottom-0 w-full bg-[#0f0f0f]/95 backdrop-blur-md border-t border-zinc-900 flex justify-around py-4 z-50">
                    <button onclick="window.go('home')" class="nav-item ${currentTab === 'home'?'active':''}"><i class="fa-solid fa-house text-xl"></i><span class="mt-1 font-bold tracking-tighter">${t.home}</span></button>
                    <button onclick="window.go('shorts')" class="nav-item ${currentTab === 'shorts'?'active':''}"><i class="fa-solid fa-bolt text-xl"></i><span class="mt-1 font-bold tracking-tighter">${t.shorts}</span></button>
                    <button onclick="window.go('upload')" class="nav-item ${currentTab === 'upload'?'active':''}"><i class="fa-solid fa-circle-plus text-3xl text-[#24A1DE]"></i></button>
                    <button onclick="window.go('library')" class="nav-item ${currentTab === 'library'?'active':''}"><i class="fa-solid fa-layer-group text-xl"></i><span class="mt-1 font-bold tracking-tighter">${t.lib}</span></button>
                    <button onclick="window.go('account')" class="nav-item ${currentTab === 'account'?'active':''}"><i class="fa-solid fa-circle-user text-xl"></i><span class="mt-1 font-bold tracking-tighter">${t.acc}</span></button>
                </nav>
            `;
        }

        // --- Functions ---
        window.go = (t) => { currentTab = t; render(); };
        window.setLang = (l) => { update(ref(db, `users/${userTgId}`), { lang: l }); };
        window.openBot = () => { tg.openTelegramLink(`https://t.me/${BOT_USERNAME}`); };

        window.handleVideoClick = (vId, ownerId) => {
            // Revenue Logic: Add point to video owner
            const ownerPoints = users[ownerId]?.adPoints || 0;
            update(ref(db, `users/${ownerId}`), { adPoints: ownerPoints + 1 });
            tg.showAlert("Ad View Recorded. Revenue added to creator.");
        };

        window.withdraw = (amount) => {
            if(amount < 10) return tg.showAlert("Min Withdraw $10");
            const reqId = Date.now();
            set(ref(db, `withdraws/${reqId}`), { uid: userTgId, name: user.first_name, amount: amount, status: 'pending' })
            .then(() => tg.showAlert("Request Sent to Admin! Check bot for status."));
        };

        window.saveAds = () => {
            set(ref(db, 'adConfig'), { monetag: document.getElementById('mId').value, adsgram: document.getElementById('aId').value })
            .then(() => tg.showAlert("Global Ad Settings Updated!"));
        };

        window.saveVideo = () => {
            const data = {
                title: document.getElementById('t').value,
                thumb: document.getElementById('th').value,
                url: document.getElementById('u').value,
                duration: document.getElementById('dur').value,
                uploaderId: userTgId,
                uploaderName: user.first_name,
                views: 0, date: Date.now()
            };
            if(data.title && data.url) { push(ref(db, 'videos'), data); window.go('home'); }
            else { tg.showAlert("Complete all fields!"); }
        };

        render();
    </script>
</body>
</html>
