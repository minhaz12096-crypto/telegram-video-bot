<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamX Bot</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://sad.adsgram.ai/js/sdk.js"></script>
    
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; margin: 0; }
        .nav-active { color: #3b82f6 !important; }
        .v-card { background: #0a0a0a; border-radius: 15px; border: 1px solid #1a1a1a; margin-bottom: 15px; overflow: hidden; }
        #adLayer { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        #player { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; }
    </style>
</head>
<body>

    <div id="adLayer">
        <div class="animate-spin h-10 w-10 border-4 border-blue-600 border-t-transparent rounded-full mb-4"></div>
        <p class="text-xs font-bold uppercase tracking-widest text-blue-500">Unlocking Content...</p>
        <p class="text-[10px] text-zinc-500 mt-2">Please wait for the ad to finish</p>
    </div>

    <div id="player">
        <div class="p-4 flex justify-between items-center glass sticky top-0 z-50 bg-black/50">
            <button onclick="closePlayer()"><i class="fa-solid fa-chevron-down text-2xl"></i></button>
            <span class="text-xs font-bold text-blue-500 uppercase">StreamX Player</span>
            <button onclick="shareLink()"><i class="fa-solid fa-share-nodes text-2xl"></i></button>
        </div>
        <video id="vSource" controls class="w-full aspect-video bg-zinc-900"></video>
        <div id="vDetails" class="p-6">
            </div>
    </div>

    <div id="app">
        <header class="p-4 flex justify-between items-center sticky top-0 bg-black z-40 border-b border-zinc-900">
            <h1 class="text-2xl font-black italic text-blue-500 tracking-tighter">STREAMX</h1>
            <i class="fa-solid fa-search text-zinc-600"></i>
        </header>

        <main id="view" class="p-4 pb-24"></main>

        <nav class="fixed bottom-0 w-full bg-black border-t border-zinc-900 flex justify-around py-4 z-50">
            <div onclick="setTab('home')" id="n-home" class="nav-active flex flex-col items-center"><i class="fa-solid fa-home text-lg"></i><span class="text-[9px] mt-1">Home</span></div>
            <div onclick="setTab('shorts')" id="n-shorts" class="flex flex-col items-center text-zinc-500"><i class="fa-solid fa-bolt text-lg"></i><span class="text-[9px] mt-1">Shorts</span></div>
            <div onclick="setTab('upload')" id="n-upload" class="flex flex-col items-center text-zinc-500"><i class="fa-solid fa-circle-plus text-2xl text-blue-600"></i></div>
            <div onclick="setTab('library')" id="n-library" class="flex flex-col items-center text-zinc-500"><i class="fa-solid fa-layer-group text-lg"></i><span class="text-[9px] mt-1">Library</span></div>
            <div onclick="setTab('account')" id="n-account" class="flex flex-col items-center text-zinc-500"><i class="fa-solid fa-user text-lg"></i><span class="text-[9px] mt-1">Account</span></div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, push, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYaSQbU380U6hcUmBgkDr4WAEmEu45X_U",
            databaseURL: "https://tonnow-pro-default-rtdb.firebaseio.com",
            projectId: "tonnow-pro"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe?.user || { id: "8382029741", first_name: "User" };

        let vList = [];
        let config = { adsgram: "2627", monetag: "10803234" };

        onValue(ref(db, 'videos'), (s) => { vList = s.val() ? Object.entries(s.val()).reverse() : []; render(); });
        onValue(ref(db, 'config/ads'), (s) => { if(s.val()) config = s.val(); });

        window.setTab = (t) => {
            document.querySelectorAll('nav div').forEach(el => el.classList.remove('nav-active', 'text-zinc-500'));
            document.getElementById(`n-${t}`)?.classList.add('nav-active');
            render(t);
        };

        window.playVideo = async (id) => {
            document.getElementById('adLayer').style.display = 'flex';
            
            // Adsgram Logic
            const AdController = window.Adsgram?.init({ blockId: config.adsgram });
            if(AdController) {
                AdController.show().then(() => startVideo(id)).catch(() => startVideo(id));
            } else {
                setTimeout(() => startVideo(id), 3000); // Fail-safe
            }
        };

        function startVideo(id) {
            document.getElementById('adLayer').style.display = 'none';
            const v = vList.find(x => x[0] === id)[1];
            document.getElementById('player').style.display = 'block';
            document.getElementById('vSource').src = v.url;
            document.getElementById('vDetails').innerHTML = `
                <h1 class="text-xl font-bold">${v.title}</h1>
                <div class="flex justify-around mt-10 py-5 border-y border-zinc-900">
                    <button onclick="tg.showAlert('Liked!')"><i class="fa-solid fa-heart text-2xl"></i></button>
                    <button onclick="tg.showAlert('Comments Loading...')"><i class="fa-solid fa-comment text-2xl"></i></button>
                    <button onclick="tg.shareLink('${v.url}')"><i class="fa-solid fa-share text-2xl"></i></button>
                    <button onclick="window.open('${v.url}')"><i class="fa-solid fa-download text-2xl"></i></button>
                </div>
            `;
            document.getElementById('vSource').play();
        }

        window.closePlayer = () => {
            document.getElementById('player').style.display = 'none';
            document.getElementById('vSource').pause();
        };

        function render(tab = 'home') {
            const root = document.getElementById('view');
            if(tab === 'home') {
                root.innerHTML = vList.map(([id, v]) => `
                    <div class="v-card" onclick="playVideo('${id}')">
                        <img src="${v.thumb}" class="w-full aspect-video object-cover">
                        <div class="p-3">
                            <h3 class="font-bold text-sm truncate">${v.title}</h3>
                            <p class="text-[10px] text-zinc-500 uppercase">${v.uploaderName} • ${v.views || 0} views</p>
                        </div>
                    </div>
                `).join('');
            } else if(tab === 'shorts') {
                root.innerHTML = `<div class="grid grid-cols-3 gap-0.5">${vList.map(([id, v]) => `
                    <div class="aspect-[9/16] bg-zinc-900" onclick="playVideo('${id}')">
                        <img src="${v.thumb}" class="w-full h-full object-cover">
                    </div>`).join('')}</div>`;
            } else if(tab === 'library') {
                root.innerHTML = `<div class="p-4"><h2 class="font-black text-xl italic uppercase text-zinc-500">History & Playlists</h2><p class="text-xs text-zinc-600 mt-2">Coming soon...</p></div>`;
            } else if(tab === 'upload') {
                root.innerHTML = `
                <div class="space-y-4">
                    <input id="ut" placeholder="Title" class="w-full bg-zinc-900 p-4 rounded-xl text-sm">
                    <input id="uth" placeholder="Thumbnail URL" class="w-full bg-zinc-900 p-4 rounded-xl text-sm">
                    <input id="uu" placeholder="Video URL" class="w-full bg-zinc-900 p-4 rounded-xl text-sm">
                    <input id="ud" placeholder="Duration (05:00)" class="w-full bg-zinc-900 p-4 rounded-xl text-sm">
                    <button onclick="doUpload()" class="w-full bg-blue-600 py-4 rounded-xl font-black uppercase text-xs">Publish Video</button>
                </div>`;
            }
        }

        window.doUpload = () => {
            const data = {
                title: document.getElementById('ut').value, thumb: document.getElementById('uth').value,
                url: document.getElementById('uu').value, duration: document.getElementById('ud').value,
                uploaderName: user.first_name, uploaderId: user.id, views: 0
            };
            if(data.title && data.url) { push(ref(db, 'videos'), data); setTab('home'); }
        };

        setTab('home');
    </script>
</body>
</html>
