<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamX Pro - Final Engine</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src='//libtl.com/sdk.js' data-zone='10803234' data-sdk='show_10803234'></script>
    <script src="https://sad.adsgram.ai/js/sdk.js"></script>

    <style>
        body { background-color: #0f0f0f; color: white; font-family: 'Roboto', sans-serif; margin: 0; overflow-x: hidden; }
        .video-card { background: #181818; border-radius: 12px; margin-bottom: 20px; transition: 0.3s; }
        .video-card:active { transform: scale(0.98); }
        .nav-item { color: #888; font-size: 10px; flex: 1; text-align: center; padding: 10px 0; transition: 0.3s; }
        .nav-item.active { color: #24A1DE; }
        input { background: #1a1a1a !important; border: 1px solid #333 !important; color: white !important; padding: 14px; border-radius: 12px; width: 100%; outline: none; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; }
        .stats-item { background: #1a1a1a; padding: 15px; border-radius: 15px; border: 1px solid #333; text-align: center; }
        
        /* Auto Ad Overlay */
        #autoAdBox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
<body>

    <div id="autoAdBox">
        <div class="text-center animate-pulse">
            <i class="fa-solid fa-rectangle-ad text-6xl text-[#24A1DE] mb-5"></i>
            <h2 class="text-xl font-black">SPONSORED AD LOADING...</h2>
            <p class="text-gray-400 text-xs mt-2">Auto-resuming your video in 5 seconds</p>
        </div>
    </div>

    <div id="app">
        <header class="p-4 flex justify-between items-center sticky top-0 bg-[#0f0f0f]/90 backdrop-blur-md z-50 border-b border-zinc-900">
            <div class="flex items-center gap-2">
                <span class="text-[#24A1DE] font-black italic text-xl tracking-tighter">STREAMX</span>
                <span class="bg-red-600 text-[8px] font-bold px-1.5 py-0.5 rounded">PRO</span>
            </div>
            <div class="flex gap-4 items-center">
                <i class="fa-solid fa-magnifying-glass text-zinc-500"></i>
                <div id="adminBadge" class="hidden"><button onclick="go('admin')" class="bg-red-600/10 text-red-500 text-[10px] font-bold px-3 py-1 rounded-full border border-red-500/30">ADMIN</button></div>
            </div>
        </header>

        <main id="viewPort" class="pb-28"></main>

        <nav class="fixed bottom-0 w-full bg-[#0f0f0f] border-t border-zinc-900 flex justify-around items-end pb-4 z-50">
            <div onclick="go('home')" id="nav-home" class="nav-item active"><i class="fa-solid fa-house text-xl"></i><p>Home</p></div>
            <div onclick="go('shorts')" id="nav-shorts" class="nav-item"><i class="fa-solid fa-bolt text-xl"></i><p>Shorts</p></div>
            <div onclick="go('upload')" id="nav-upload" class="nav-item"><i class="fa-solid fa-circle-plus text-4xl text-[#24A1DE]"></i></div>
            <div onclick="go('library')" id="nav-library" class="nav-item"><i class="fa-solid fa-layer-group text-xl"></i><p>Library</p></div>
            <div onclick="go('account')" id="nav-account" class="nav-item"><i class="fa-solid fa-circle-user text-xl"></i><p>Account</p></div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, push, update, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYaSQbU380U6hcUmBgkDr4WAEmEu45X_U",
            authDomain: "tonnow-pro.firebaseapp.com",
            databaseURL: "https://tonnow-pro-default-rtdb.firebaseio.com",
            projectId: "tonnow-pro",
            storageBucket: "tonnow-pro.firebasestorage.app",
            messagingSenderId: "585362095075",
            appId: "1:585362095075:web:a94096a650ab74f3e03ed6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe?.user || { id: "8382029741", first_name: "Minhaz" };
        const ADMIN_ID = "8382029741";
        const ADSGRAM_BLOCK_ID = "2627";

        let currentTab = 'home';
        let videos = [];
        let userData = { verified: false, adPoints: 0 };
        let adTimer;

        // --- Data Listeners ---
        onValue(ref(db, `users/${user.id}`), (s) => { if(s.val()) userData = s.val(); render(); });
        onValue(ref(db, 'videos'), (s) => { 
            videos = s.val() ? Object.entries(s.val()).map(([id, v]) => ({id, ...v})).reverse() : [];
            render();
        });

        // --- Auto Ad Engine ---
        function startAutoAds() {
            clearInterval(adTimer);
            adTimer = setInterval(() => {
                if(currentTab === 'home') triggerRealAd();
            }, 60000); // প্রতি ১ মিনিট পর পর
        }

        async function triggerRealAd() {
            document.getElementById('autoAdBox').style.display = 'flex';
            
            // Adsgram Integration
            const AdController = window.Adsgram.init({ blockId: ADSGRAM_BLOCK_ID });
            AdController.show().then(() => {
                finishAd();
            }).catch(() => {
                // If Adsgram fails, try Monetag logic
                if(window.show_10803234) window.show_10803234();
                setTimeout(finishAd, 5000);
            });
        }

        function finishAd() {
            document.getElementById('autoAdBox').style.display = 'none';
            const newPoints = (userData.adPoints || 0) + 1;
            update(ref(db, `users/${user.id}`), { adPoints: newPoints });
        }

        window.go = (tab) => {
            currentTab = tab;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${tab}`).classList.add('active');
            render();
        };

        function render() {
            const view = document.getElementById('viewPort');
            if(user.id.toString() === ADMIN_ID) document.getElementById('adminBadge').classList.remove('hidden');

            if (currentTab === 'home') {
                startAutoAds();
                view.innerHTML = videos.map(v => `
                    <div class="video-card">
                        <div class="relative">
                            <img src="${v.thumb}" class="w-full aspect-video object-cover" onclick="window.openVid('${v.url}')">
                            <span class="absolute bottom-2 right-2 bg-black/80 text-[10px] px-1.5 py-0.5 rounded">${v.duration || '0:00'}</span>
                        </div>
                        <div class="p-4 flex gap-3">
                            <div class="w-10 h-10 rounded-full bg-zinc-800 flex-shrink-0 flex items-center justify-center font-bold text-[#24A1DE]">${v.uploaderName[0]}</div>
                            <div class="flex-1">
                                <h3 class="text-sm font-bold line-clamp-2">${v.title}</h3>
                                <p class="text-[10px] text-zinc-500 mt-1 uppercase">${v.uploaderName} • ${v.views || 0} views</p>
                                <div class="flex gap-2 mt-3">
                                    <button onclick="window.openVid('${v.url}')" class="flex-1 bg-red-600 py-2 rounded-lg font-bold text-xs"><i class="fa-solid fa-play mr-2"></i>Play Video</button>
                                    <button onclick="tg.shareLink('${v.url}')" class="bg-zinc-800 px-4 py-2 rounded-lg"><i class="fa-solid fa-share"></i></button>
                                </div>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            else if (currentTab === 'library') {
                view.innerHTML = `
                    <div class="p-4 space-y-6">
                        <h2 class="text-xs font-black uppercase text-zinc-500 tracking-widest">Community Stats</h2>
                        <div class="stats-grid">
                            <div class="stats-item"><p class="text-2xl font-black text-green-500">71</p><p class="text-[9px] text-zinc-500 uppercase">Online Now</p></div>
                            <div class="stats-item"><p class="text-2xl font-black">${videos.length}</p><p class="text-[9px] text-zinc-500 uppercase">Total Posts</p></div>
                            <div class="stats-item"><p class="text-2xl font-black text-blue-500">2,401</p><p class="text-[9px] text-zinc-500 uppercase">Total Users</p></div>
                            <div class="stats-item"><p class="text-2xl font-black text-yellow-500">N/A</p><p class="text-[9px] text-zinc-500 uppercase">Most Liked</p></div>
                        </div>
                        <div class="bg-gradient-to-br from-zinc-900 to-black p-6 rounded-2xl border border-zinc-800">
                            <i class="fa-solid fa-trophy text-3xl text-yellow-500 mb-3"></i>
                            <h3 class="font-bold">Trending Content</h3>
                            <p class="text-[10px] text-zinc-500 mt-1">সবচেয়ে বেশি লাইক এবং ভিউ পাওয়া ভিডিওগুলো এখন লাইব্রেরিতে উন্মুক্ত!</p>
                        </div>
                    </div>
                `;
            }

            else if (currentTab === 'upload') {
                if (!userData.verified && user.id.toString() !== ADMIN_ID) {
                    view.innerHTML = `
                        <div class="p-10 text-center flex flex-col items-center justify-center min-h-[60vh]">
                            <div class="w-20 h-20 bg-blue-500/10 rounded-full flex items-center justify-center mb-6">
                                <i class="fa-solid fa-robot text-4xl text-[#24A1DE]"></i>
                            </div>
                            <h2 class="font-black text-xl uppercase italic">Bot Confirm Required</h2>
                            <p class="text-xs text-zinc-500 mt-3 mb-8 px-4">আপনার অ্যাকাউন্টটি আমাদের অফিসিয়াল বটের মাধ্যমে ভেরিফাই করা নেই। আপলোড অপশনটি চালু করতে নিচের বাটনে ক্লিক করে কনফার্ম করুন।</p>
                            <button onclick="tg.openTelegramLink('https://t.me/YourBotUser_Bot')" class="w-full bg-[#24A1DE] py-4 rounded-2xl font-black uppercase shadow-lg shadow-blue-500/20">CONFIRM VIA BOT</button>
                        </div>`;
                } else {
                    view.innerHTML = `
                        <div class="p-6 space-y-4 animate-fadeIn">
                            <h2 class="text-xs font-black uppercase text-[#24A1DE]">+ New Video Upload</h2>
                            <input id="vT" placeholder="Video Title">
                            <input id="vTh" placeholder="Photo/Thumbnail URL">
                            <input id="vU" placeholder="Video Link (Direct MP4)">
                            <div class="flex gap-2">
                                <input id="vD" placeholder="Duration (05:00)" class="flex-1">
                                <input id="vA" placeholder="Ads to Unlock" class="flex-1">
                            </div>
                            <button onclick="window.publishPost()" class="w-full bg-[#24A1DE] py-5 rounded-2xl font-black uppercase text-sm mt-4">PUBLISH POST</button>
                        </div>`;
                }
            }

            else if (currentTab === 'account') {
                const balance = ((userData.adPoints || 0) / 1000) * 10;
                view.innerHTML = `
                    <div class="p-6 space-y-6">
                        <div class="flex items-center gap-4 mb-4">
                            <div class="w-16 h-16 rounded-full bg-blue-600 flex items-center justify-center text-2xl font-bold">${user.first_name[0]}</div>
                            <div><h2 class="font-black text-lg">${user.first_name} 👑</h2><p class="text-[10px] text-zinc-500">UID: ${user.id}</p></div>
                        </div>
                        <div class="bg-gradient-to-r from-[#24A1DE] to-[#1474a1] p-6 rounded-[30px] shadow-2xl shadow-blue-500/20">
                            <p class="text-[10px] font-black uppercase opacity-70">Estimated Balance</p>
                            <h1 class="text-4xl font-black mt-1">$${balance.toFixed(2)}</h1>
                            <div class="flex justify-between items-center mt-6 pt-4 border-t border-white/10">
                                <span class="text-[11px] font-bold">ADS VIEWED: ${userData.adPoints || 0}/1000</span>
                                <button onclick="tg.showAlert('Minimum $10 required to withdraw')" class="bg-white text-[#24A1DE] px-6 py-2 rounded-full font-black text-[10px]">WITHDRAW</button>
                            </div>
                        </div>
                        <div class="stats-grid">
                            <div class="stats-item bg-zinc-900 border-none"><p class="text-xl font-black">1</p><p class="text-[8px] text-zinc-500 uppercase">My Posts</p></div>
                            <div class="stats-item bg-zinc-900 border-none"><p class="text-xl font-black text-pink-500">0</p><p class="text-[8px] text-zinc-500 uppercase">Total Likes</p></div>
                        </div>
                    </div>
                `;
            }
        }

        window.openVid = (url) => { tg.openLink(url); };
        
        window.publishPost = () => {
            const data = {
                title: document.getElementById('vT').value,
                thumb: document.getElementById('vTh').value,
                url: document.getElementById('vU').value,
                duration: document.getElementById('vD').value,
                uploaderId: user.id,
                uploaderName: user.first_name,
                views: 0, date: Date.now()
            };
            if(data.title && data.url) {
                push(ref(db, 'videos'), data);
                tg.showAlert("Post Published Successfully!");
                go('home');
            }
        };

        render();
    </script>
</body>
</html>
