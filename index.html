<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamX - YouTube Style</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #0f0f0f; color: white; margin: 0; font-family: 'Roboto', sans-serif; }
        .yt-card { background: #0f0f0f; transition: background 0.3s; }
        .yt-card:active { background: #272727; }
        .nav-item { color: #aaaaaa; font-size: 10px; }
        .nav-item.active { color: white; }
        /* প্রফেশনাল ইউটিউব থাম্বনেইল লুক */
        .thumb-container { position: relative; width: 100%; aspect-ratio: 16 / 9; overflow: hidden; border-radius: 12px; }
    </style>
</head>
<body>
    <div id="app"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYaSQbU380U6hcUmBgkDr4WAEmEu45X_U",
            authDomain: "tonnow-pro.firebaseapp.com",
            databaseURL: "https://tonnow-pro-default-rtdb.firebaseio.com",
            projectId: "tonnow-pro",
            storageBucket: "tonnow-pro.firebasestorage.app",
            messagingSenderId: "585362095075",
            appId: "1:585362095075:web:a94096a650ab74f3e03ed6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const MY_ADMIN_ID = "8382029741";

        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.ready();

        const userTgId = tg.initDataUnsafe?.user?.id?.toString() || "Guest";
        let currentTab = 'home';
        let videos = [];

        function render() {
            const root = document.getElementById('app');
            let content = '';

            if (currentTab === 'home') {
                content = `
                    <div class="flex flex-col gap-1 pb-4">
                        ${videos.length === 0 ? '<div class="text-center py-20 text-gray-500">Loading YouTube Style Feed...</div>' : ''}
                        ${videos.map(v => `
                            <div class="yt-card w-full mb-4 px-0">
                                <div class="thumb-container">
                                    <img src="${v.thumb}" class="w-full h-full object-cover">
                                    <span class="absolute bottom-2 right-2 bg-black/80 text-white text-[10px] px-1.5 py-0.5 rounded font-bold">${v.duration || '10:00'}</span>
                                </div>
                                <div class="flex gap-3 p-3">
                                    <div class="w-10 h-10 rounded-full bg-red-600 flex-shrink-0 flex items-center justify-center font-bold text-lg italic">S</div>
                                    <div class="flex flex-col flex-1">
                                        <h3 class="text-[14px] font-medium leading-5 line-clamp-2">${v.title}</h3>
                                        <p class="text-[12px] text-[#aaaaaa] mt-1">StreamX • ${v.views || '1.2K'} views • 1 hour ago</p>
                                    </div>
                                    <button class="text-[#aaaaaa] pt-1"><i class="fa-solid fa-ellipsis-vertical"></i></button>
                                </div>
                                <div class="px-3 pb-2">
                                    <button onclick="alert('Playing Video...')" class="w-full bg-[#cc0000] py-2 rounded-full font-bold text-sm uppercase">Play Video</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                `;
            } else if (currentTab === 'admin') {
                content = `<div class="p-4"><h2 class="text-xl font-bold mb-4">Admin Panel</h2><p class="text-gray-400 italic">ইউটিউব স্টাইলে ভিডিও পাবলিশ করুন নিচে থেকে...</p></div>`; // এখানে আগের অ্যাডমিন কোডটি রাখতে পারেন
            }

            root.innerHTML = `
                <header class="p-3 flex justify-between items-center sticky top-0 bg-[#0f0f0f] z-50">
                    <div class="flex items-center gap-1">
                        <i class="fa-brands fa-youtube text-[#ff0000] text-3xl"></i>
                        <span class="text-white font-bold text-xl tracking-tighter">YouTube</span>
                    </div>
                    <div class="flex gap-5 text-xl">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <div class="w-7 h-7 rounded-full bg-blue-500 text-xs flex items-center justify-center">A</div>
                    </div>
                </header>

                <main class="min-h-screen">${content}</main>

                <nav class="fixed bottom-0 w-full bg-[#0f0f0f] border-t border-[#272727] flex justify-around items-center py-2 z-50">
                    <button onclick="window.go('home')" class="nav-item ${currentTab === 'home' ? 'active' : ''} flex flex-col items-center">
                        <i class="fa-solid fa-house text-lg mb-1"></i>
                        <span>Home</span>
                    </button>
                    <button class="nav-item flex flex-col items-center">
                        <i class="fa-solid fa-bolt text-lg mb-1"></i>
                        <span>Shorts</span>
                    </button>
                    <button class="text-3xl text-white"><i class="fa-regular fa-circle-plus"></i></button>
                    <button onclick="window.go('refer')" class="nav-item flex flex-col items-center">
                        <i class="fa-solid fa-share-nodes text-lg mb-1"></i>
                        <span>Refer</span>
                    </button>
                    ${userTgId === MY_ADMIN_ID ? `
                    <button onclick="window.go('admin')" class="nav-item ${currentTab === 'admin' ? 'active' : ''} flex flex-col items-center">
                        <i class="fa-solid fa-gear text-lg mb-1"></i>
                        <span>Admin</span>
                    </button>` : `
                    <button class="nav-item flex flex-col items-center">
                        <i class="fa-solid fa-layer-group text-lg mb-1"></i>
                        <span>Library</span>
                    </button>`}
                </nav>
            `;
        }

        window.go = (t) => { currentTab = t; render(); };
        onValue(ref(db, 'videos'), (s) => {
            const d = s.val();
            videos = d ? Object.entries(d).map(([id,v]) => ({id,...v})).reverse() : [];
            render();
        });
    </script>
</body>
</html>
