<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamX - All Features Final</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src='//libtl.com/sdk.js' data-zone='10803234' data-sdk='show_10803234'></script>
    <script src="https://sad.adsgram.ai/js/sdk.js"></script>

    <style>
        body { background-color: #0f0f0f; color: white; font-family: 'Roboto', sans-serif; margin: 0; overflow-x: hidden; }
        .nav-active { color: #24A1DE !important; font-weight: 900; }
        .video-card { background: #181818; border-radius: 15px; margin-bottom: 20px; border: 1px solid #222; }
        input, select { background: #1a1a1a !important; border: 1px solid #333 !important; color: white !important; padding: 15px; border-radius: 12px; width: 100%; outline: none; }
        .stats-card { background: #1a1a1a; padding: 15px; border-radius: 18px; border: 1px solid #333; text-align: center; }
        
        /* Auto Ad Pop-up */
        #adPopup { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; }
        .loader { border: 4px solid #1a1a1a; border-top: 4px solid #24A1DE; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* Video Player Layer */
        #playerUI { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 9999; display: none; overflow-y: auto; }
    </style>
</head>
<body>

    <div id="adPopup">
        <div class="loader mb-4"></div>
        <h2 class="text-xl font-black text-[#24A1DE]">LOADING SPONSORED AD...</h2>
        <p class="text-gray-500 text-xs mt-2">Please wait 5 seconds to unlock your video.</p>
    </div>

    <div id="playerUI">
        <div class="p-4 flex justify-between items-center bg-black/80 sticky top-0 z-[10001]">
            <button onclick="closePlayer()" class="text-2xl"><i class="fa-solid fa-chevron-down"></i></button>
            <span class="text-[10px] font-bold text-[#24A1DE] uppercase tracking-widest">Watching Now</span>
            <button onclick="shareLink()" class="text-xl"><i class="fa-solid fa-share-nodes"></i></button>
        </div>
        <video id="vPlayer" controls class="w-full aspect-video bg-zinc-900"></video>
        <div id="vDetails" class="p-5 space-y-6"></div>
    </div>

    <div id="app">
        <header class="p-4 flex justify-between items-center sticky top-0 bg-[#0f0f0f] z-50 border-b border-zinc-900">
            <div class="flex items-center gap-2">
                <span class="text-[#24A1DE] font-black italic text-2xl">STREAMX</span>
                <select id="langSwitch" onchange="setLang(this.value)" class="!w-16 !p-1 !text-[10px] !bg-transparent !border-none">
                    <option value="en">EN</option><option value="bn">BN</option><option value="ru">RU</option>
                </select>
            </div>
            <div class="flex gap-4 items-center">
                <i class="fa-solid fa-magnifying-glass text-zinc-400" onclick="tg.showAlert('Search active')"></i>
                <div id="adminBtn" class="hidden"><button onclick="go('admin')" class="text-red-500 text-[10px] font-bold border border-red-500/30 px-3 py-1 rounded-full">ADMIN</button></div>
            </div>
        </header>

        <main id="main" class="pb-32"></main>

        <nav class="fixed bottom-0 w-full bg-[#0f0f0f] border-t border-zinc-900 flex justify-around items-end pb-4 z-50">
            <div onclick="go('home')" class="flex flex-col items-center text-gray-500" id="nav-home"><i class="fa-solid fa-house text-xl"></i><span class="text-[10px] mt-1">Home</span></div>
            <div onclick="go('shorts')" class="flex flex-col items-center text-gray-500" id="nav-shorts"><i class="fa-solid fa-bolt text-xl"></i><span class="text-[10px] mt-1">Shorts</span></div>
            <div onclick="go('upload')" class="flex flex-col items-center"><i class="fa-solid fa-circle-plus text-4xl text-[#24A1DE]"></i></div>
            <div onclick="go('library')" class="flex flex-col items-center text-gray-500" id="nav-library"><i class="fa-solid fa-layer-group text-xl"></i><span class="text-[10px] mt-1">Library</span></div>
            <div onclick="go('account')" class="flex flex-col items-center text-gray-500" id="nav-account"><i class="fa-solid fa-circle-user text-xl"></i><span class="text-[10px] mt-1">Account</span></div>
        </nav>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, set, push, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYaSQbU380U6hcUmBgkDr4WAEmEu45X_U",
            authDomain: "tonnow-pro.firebaseapp.com",
            databaseURL: "https://tonnow-pro-default-rtdb.firebaseio.com",
            projectId: "tonnow-pro",
            storageBucket: "tonnow-pro.firebasestorage.app",
            messagingSenderId: "585362095075",
            appId: "1:585362095075:web:a94096a650ab74f3e03ed6"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const tg = window.Telegram.WebApp;
        const user = tg.initDataUnsafe?.user || { id: "8382029741", first_name: "Minhaz" };
        const ADMIN_ID = "8382029741";

        let currentTab = 'home';
        let videos = [];
        let userData = { verified: false, adPoints: 0, lang: 'en' };
        let autoAdInterval;

        // --- Data Loaders ---
        onValue(ref(db, `users/${user.id}`), (s) => { 
            if(s.val()) { userData = s.val(); document.getElementById('langSwitch').value = userData.lang; }
            render(); 
        });
        onValue(ref(db, 'videos'), (s) => { 
            videos = s.val() ? Object.entries(s.val()).map(([id, v]) => ({id, ...v})).reverse() : [];
            render();
        });

        // --- Tab Management ---
        window.go = (tab) => {
            currentTab = tab;
            document.querySelectorAll('nav div').forEach(el => el.classList.remove('nav-active'));
            if(document.getElementById(`nav-${tab}`)) document.getElementById(`nav-${tab}`).classList.add('nav-active');
            render();
        };

        window.setLang = (lang) => { update(ref(db, `users/${user.id}`), { lang: lang }); };

        // --- Ad Engine ---
        function runAutoAds() {
            clearInterval(autoAdInterval);
            autoAdInterval = setInterval(() => {
                if(currentTab === 'home') triggerRealAd();
            }, 60000); // ১ মিনিট পর পর
        }

        async function triggerRealAd() {
            document.getElementById('adPopup').style.display = 'flex';
            const AdController = window.Adsgram.init({ blockId: "2627" });
            AdController.show().then(() => finishAd()).catch(() => {
                if(window.show_10803234) window.show_10803234();
                setTimeout(finishAd, 5000);
            });
        }

        function finishAd() {
            document.getElementById('adPopup').style.display = 'none';
            update(ref(db, `users/${user.id}`), { adPoints: (userData.adPoints || 0) + 1 });
        }

        // --- Render Engine ---
        function render() {
            const main = document.getElementById('main');
            if(user.id.toString() === ADMIN_ID) document.getElementById('adminBtn').classList.remove('hidden');

            if (currentTab === 'home') {
                runAutoAds();
                main.innerHTML = videos.map(v => `
                    <div class="video-card">
                        <img src="${v.thumb}" class="w-full aspect-video object-cover rounded-t-xl" onclick="playVid('${v.id}')">
                        <div class="p-4 flex gap-3">
                            <div class="w-10 h-10 rounded-full bg-blue-600 flex items-center justify-center font-bold">${v.uploaderName[0]}</div>
                            <div class="flex-1">
                                <h3 class="text-sm font-bold line-clamp-2">${v.title}</h3>
                                <p class="text-[10px] text-gray-500 mt-1 uppercase">${v.uploaderName} • ${v.views || 0} views</p>
                            </div>
                        </div>
                    </div>
                `).join('');
            }

            else if (currentTab === 'shorts') {
                main.innerHTML = `<div class="grid grid-cols-3 gap-0.5">${videos.map(v => `<div class="aspect-[9/16] bg-zinc-900 border border-white/5"><img src="${v.thumb}" class="w-full h-full object-cover"></div>`).join('')}</div>`;
            }

            else if (currentTab === 'library') {
                main.innerHTML = `
                    <div class="p-4 space-y-6">
                        <h2 class="text-xs font-black uppercase text-zinc-500">Community Library</h2>
                        <div class="grid grid-cols-2 gap-3">
                            <div class="stats-card"><p class="text-2xl font-black text-green-500">84</p><p class="text-[9px] text-gray-500 uppercase">Online</p></div>
                            <div class="stats-card"><p class="text-2xl font-black">${videos.length}</p><p class="text-[9px] text-gray-500 uppercase">Total Posts</p></div>
                        </div>
                        <div class="bg-gradient-to-br from-zinc-900 to-black p-6 rounded-2xl border border-zinc-800">
                            <i class="fa-solid fa-trophy text-3xl text-yellow-500 mb-3"></i>
                            <h3 class="font-bold">Trending History</h3>
                            <p class="text-[10px] text-zinc-500 mt-1">সবচেয়ে জনপ্রিয় ভিডিওগুলো এখানে জমা থাকে।</p>
                        </div>
                    </div>
                `;
            }

            else if (currentTab === 'upload') {
                if (!userData.verified && user.id.toString() !== ADMIN_ID) {
                    main.innerHTML = `
                        <div class="p-10 text-center flex flex-col items-center justify-center min-h-[60vh]">
                            <i class="fa-solid fa-robot text-6xl text-[#24A1DE] mb-6"></i>
                            <h2 class="font-black text-xl uppercase">Confirm via Bot</h2>
                            <p class="text-xs text-gray-500 mt-3 mb-8">You must verify your account via our official bot to upload videos.</p>
                            <button onclick="tg.openTelegramLink('https://t.me/YourBotUser')" class="w-full bg-[#24A1DE] py-4 rounded-2xl font-black uppercase">GO TO BOT</button>
                        </div>`;
                } else {
                    main.innerHTML = `
                        <div class="p-6 space-y-4">
                            <h2 class="text-xs font-black uppercase text-[#24A1DE] tracking-widest">+ New Video</h2>
                            <input id="vT" placeholder="Video Title">
                            <input id="vTh" placeholder="Thumbnail Image URL">
                            <input id="vU" placeholder="Direct MP4 Link">
                            <input id="vD" placeholder="Duration (e.g. 05:20)">
                            <button onclick="publishPost()" class="w-full bg-[#24A1DE] py-5 rounded-2xl font-black uppercase text-sm mt-4">PUBLISH NOW</button>
                        </div>`;
                }
            }

            else if (currentTab === 'account') {
                const balance = ((userData.adPoints || 0) / 1000) * 10;
                main.innerHTML = `
                    <div class="p-6 space-y-6">
                        <div class="flex items-center gap-4">
                            <div class="w-16 h-16 rounded-full bg-blue-600 flex items-center justify-center text-2xl font-bold">${user.first_name[0]}</div>
                            <div><h2 class="font-black text-xl">${user.first_name}</h2><p class="text-[10px] text-gray-500">ID: ${user.id}</p></div>
                        </div>
                        <div class="bg-gradient-to-r from-[#24A1DE] to-[#1474a1] p-6 rounded-[30px] shadow-2xl">
                            <p class="text-[10px] font-black uppercase opacity-70">Balance</p>
                            <h1 class="text-4xl font-black mt-1">$${balance.toFixed(2)}</h1>
                            <div class="flex justify-between items-center mt-6 pt-4 border-t border-white/10">
                                <span class="text-xs font-bold">ADS: ${userData.adPoints || 0}/1000</span>
                                <button onclick="tg.showAlert('Need $10')" class="bg-white text-blue-600 px-6 py-2 rounded-full font-black text-[10px]">WITHDRAW</button>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        // --- Functional Logic ---
        window.playVid = (id) => {
            const v = videos.find(x => x.id === id);
            document.getElementById('playerUI').style.display = 'block';
            document.getElementById('vPlayer').src = v.url;
            document.getElementById('vDetails').innerHTML = `
                <h1 class="text-xl font-bold">${v.title}</h1>
                <div class="flex justify-around border-y border-zinc-900 py-6">
                    <div class="flex flex-col items-center" onclick="tg.showAlert('Liked')"><i class="fa-solid fa-heart text-2xl mb-1 text-red-500"></i><span class="text-[10px]">Like</span></div>
                    <div class="flex flex-col items-center" onclick="tg.showAlert('Comment active')"><i class="fa-solid fa-comment text-2xl mb-1"></i><span class="text-[10px]">Comment</span></div>
                    <div class="flex flex-col items-center" onclick="tg.shareLink('${v.url}')"><i class="fa-solid fa-share text-2xl mb-1"></i><span class="text-[10px]">Share</span></div>
                    <div class="flex flex-col items-center" onclick="window.open('${v.url}')"><i class="fa-solid fa-circle-arrow-down text-2xl mb-1 text-green-500"></i><span class="text-[10px]">Download</span></div>
                </div>
            `;
            update(ref(db, `videos/${id}`), { views: (v.views || 0) + 1 });
            document.getElementById('vPlayer').play();
        };

        window.closePlayer = () => { document.getElementById('playerUI').style.display = 'none'; document.getElementById('vPlayer').pause(); };
        
        window.publishPost = () => {
            const d = {
                title: document.getElementById('vT').value, thumb: document.getElementById('vTh').value, url: document.getElementById('vU').value,
                duration: document.getElementById('vD').value, uploaderId: user.id, uploaderName: user.first_name, views: 0, date: Date.now()
            };
            if(d.title && d.url) { push(ref(db, 'videos'), d); go('home'); }
        };

        render();
    </script>
</body>
</html>
